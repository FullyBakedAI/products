<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Ops Design</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar { width: 160px; }
@media (max-width: 480px) { .avatar { width: 120px; } }
</style>
</head>
<body>
<svg class="avatar" viewBox="0 0 320 150" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer frame -->
  <path fill="#d0d0d0" d="
    M50 32
    C50 16 95 6 150 6
    L170 6
    C225 6 270 16 270 32
    L270 72
    C270 90 230 100 185 100
    L180 100
    C168 100 163 93 160 88
    C157 93 152 100 140 100
    L135 100
    C90 100 50 90 50 72
    Z
  "/>

  <!-- Inner bevel -->
  <path fill="#bbb" d="
    M56 34
    C56 20 98 11 151 11
    L169 11
    C222 11 264 20 264 34
    L264 70
    C264 86 226 95 183 95
    L179 95
    C167 95 162 89 160 84
    C158 89 153 95 141 95
    L137 95
    C94 95 56 86 56 70
    Z
  "/>

  <!-- Black lens -->
  <path fill="#111" d="
    M64 37
    C64 25 102 17 152 17
    L168 17
    C218 17 256 25 256 37
    L256 67
    C256 81 222 90 181 90
    L177 90
    C166 90 162 84 160 80
    C158 84 154 90 143 90
    L139 90
    C98 90 64 81 64 67
    Z
  "/>

  <!-- Top centre mount -->
  <path fill="#d0d0d0" d="M153 6 C155 -1 157 -3 160 -4 C163 -3 165 -1 167 6 Z"/>
  <path fill="#aaa" d="M155 6 C157 1 159 -1 160 -2 C161 -1 163 1 165 6 Z"/>

  <!-- Left buckle -->
  <rect x="28" y="42" width="22" height="20" rx="4" fill="#d0d0d0"/>
  <rect x="30" y="44" width="18" height="16" rx="3" fill="#bbb"/>

  <!-- Right buckle -->
  <rect x="270" y="42" width="22" height="20" rx="4" fill="#d0d0d0"/>
  <rect x="272" y="44" width="18" height="16" rx="3" fill="#bbb"/>

  <!-- Hipster moustache -->
  <path d="M130 118 Q140 106 148 111 Q155 118 160 118 Q165 118 172 111 Q180 106 190 118" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M130 118 Q121 126 112 121" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M190 118 Q199 126 208 121" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M133 120 Q142 110 149 114 Q155 120 160 120 Q165 120 171 114 Q178 110 187 120" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Small beard -->
  <path d="M150 128 Q148 134 146 138 Q144 142 148 144 Q154 147 160 147 Q166 147 172 144 Q176 142 174 138 Q172 134 170 128" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M153 130 Q155 140 160 142 Q165 140 167 130" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

</svg>
</body>
</html>
