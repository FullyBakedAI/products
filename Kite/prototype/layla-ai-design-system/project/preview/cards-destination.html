<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);display:flex;gap:20px}
  .dest{flex:1;background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden;border:1px solid var(--line)}
  .dest img{width:100%;height:160px;object-fit:cover;display:block}
  .dest .body{padding:14px}
  .dest h4{margin:0 0 4px;font-family:var(--font-display);font-size:18px;font-weight:400;color:var(--ink)}
  .dest p{margin:0;font-size:13px;color:var(--muted-ink)}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--muted-ink)}
  .price{color:var(--ink);font-weight:600;font-size:14px}
</style></head>
<body><div class="card">
  <div class="dest">
    <img src="../assets/photos/santorini.svg">
    <div class="body">
      <h4>Santorini</h4>
      <p>Greek Islands · 5 days</p>
      <div class="meta"><span>★ 4.9 · Couples</span><span class="price">from €820</span></div>
    </div>
  </div>
  <div class="dest">
    <img src="../assets/photos/tuscany.svg">
    <div class="body">
      <h4>Tuscany</h4>
      <p>Italy · 7 days road trip</p>
      <div class="meta"><span>★ 4.8 · Family</span><span class="price">from €1,140</span></div>
    </div>
  </div>
</div></body></html>
