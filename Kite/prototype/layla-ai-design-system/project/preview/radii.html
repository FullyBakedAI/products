<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);display:flex;gap:14px;align-items:center;justify-content:space-around}
  .box{background:var(--sand);width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--ink);border:1px solid var(--line)}
  .caption{font-size:10px;color:var(--muted-ink);margin-top:6px;text-align:center;font-family:var(--font-mono)}
  .group{display:flex;flex-direction:column;align-items:center}
</style></head>
<body><div class="card">
  <div class="group"><div class="box" style="border-radius:4px">4</div><div class="caption">xs</div></div>
  <div class="group"><div class="box" style="border-radius:6px">6</div><div class="caption">sm</div></div>
  <div class="group"><div class="box" style="border-radius:12px">12</div><div class="caption">md</div></div>
  <div class="group"><div class="box" style="border-radius:20px">20</div><div class="caption">lg (card)</div></div>
  <div class="group"><div class="box" style="border-radius:28px">28</div><div class="caption">xl (hero)</div></div>
  <div class="group"><div class="box" style="border-radius:9999px">∞</div><div class="caption">pill</div></div>
</div></body></html>
