<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:24px}
  img{height:56px;width:auto}
  .mark{height:56px;color:var(--ink)}
  .mark svg{height:100%;width:auto}
  .sep{width:1px;height:56px;background:var(--line)}
  .on-dark{background:var(--ink);padding:12px 20px;border-radius:var(--radius-md)}
  .on-dark img{height:32px}
</style></head>
<body><div class="card">
  <img src="../assets/layla-logo.svg" alt="Layla logo">
  <div class="sep"></div>
  <div class="mark"><img src="../assets/layla-mark.svg" style="height:56px;width:auto" alt="Layla L mark"></div>
  <div class="sep"></div>
  <div class="on-dark"><img src="../assets/layla-logo-white.svg" alt="Layla white logo"></div>
</div></body></html>
