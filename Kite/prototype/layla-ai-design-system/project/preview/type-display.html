<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow-md)}
  .display{font-family:var(--font-display);font-size:64px;line-height:1.05;letter-spacing:-.02em;color:var(--ink);margin:0}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted-ink);margin-top:12px}
  .alt{font-family:var(--font-display);font-style:italic;color:var(--muted-ink);font-size:28px;margin-top:12px}
</style></head>
<body><div class="card">
  <p class="display">Your trip. Planned in minutes.</p>
  <p class="alt">Your trip. Planned in minutes.</p>
  <p class="meta">DM Serif Display · Regular · clamp(44px, 6vw, 80px) · letter-spacing -0.02em · [substitute for Layla's custom display]</p>
</div></body></html>
