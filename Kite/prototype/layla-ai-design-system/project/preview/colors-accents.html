<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:652px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .swatch{flex:1;min-width:0;height:92px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;font-size:12px}
  .label{font-weight:600;font-size:12px}
  .hex{opacity:.75;font-family:var(--font-mono);font-size:11px}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="swatch" style="background:var(--sky);color:var(--ink)"><div class="label">Sky</div><div class="hex">#A8D8E8</div></div>
    <div class="swatch" style="background:var(--sky-strong);color:#fff"><div class="label">Sky Strong</div><div class="hex">#7DBFD6</div></div>
    <div class="swatch" style="background:var(--sky-soft);color:var(--ink)"><div class="label">Sky Soft</div><div class="hex">#E6F3F8</div></div>
    <div class="swatch" style="background:var(--coral);color:var(--ink)"><div class="label">Coral</div><div class="hex">#F4A88A</div></div>
    <div class="swatch" style="background:var(--coral-strong);color:#fff"><div class="label">Coral Strong</div><div class="hex">#E08263</div></div>
    <div class="swatch" style="background:var(--coral-soft);color:var(--ink)"><div class="label">Coral Soft</div><div class="hex">#FBE8DE</div></div>
    <div class="swatch" style="background:var(--gold);color:var(--ink)"><div class="label">Gold (★)</div><div class="hex">#E8B961</div></div>
  </div>
</div></body></html>
