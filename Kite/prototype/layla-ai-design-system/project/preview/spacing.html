<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);display:flex;gap:18px;align-items:flex-end}
  .box{background:var(--bone);border:1px dashed var(--line);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--muted-ink)}
</style></head>
<body><div class="card">
  <div class="box" style="width:4px;height:40px">4</div>
  <div class="box" style="width:8px;height:40px">8</div>
  <div class="box" style="width:12px;height:40px">12</div>
  <div class="box" style="width:16px;height:40px">16</div>
  <div class="box" style="width:24px;height:50px">24</div>
  <div class="box" style="width:32px;height:60px">32</div>
  <div class="box" style="width:48px;height:70px">48</div>
  <div class="box" style="width:64px;height:80px">64</div>
  <div class="box" style="width:96px;height:90px">96</div>
  <div class="box" style="width:128px;height:100px">128</div>
</div></body></html>
