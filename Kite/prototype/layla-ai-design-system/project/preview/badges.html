<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-md);display:flex;gap:10px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-pill);font-size:12px;font-weight:600}
  .gold{background:var(--warning-soft);color:#8A6B1F}
  .sky{background:var(--sky-soft);color:#2A6A80}
  .coral{background:var(--coral-soft);color:#8A3F25}
  .green{background:var(--success-soft);color:#2E6940}
  .ink{background:var(--ink);color:#fff}
  .sand{background:var(--sand);color:var(--ink)}
</style></head>
<body><div class="card">
  <span class="badge gold">★ 4.9 rating</span>
  <span class="badge sky">Hidden gem</span>
  <span class="badge coral">Trending</span>
  <span class="badge green">✓ Booked</span>
  <span class="badge ink">Layla Prime</span>
  <span class="badge sand">Family-friendly</span>
  <span class="badge coral">Sun all year</span>
  <span class="badge sky">Layla's pick</span>
</div></body></html>
