<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-md)}
  .chat{display:flex;gap:10px;margin-bottom:12px}
  .av{width:32px;height:32px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;flex-shrink:0}
  .msg{background:var(--bone);border-radius:16px 16px 16px 4px;padding:12px 16px;font-size:14px;line-height:1.55;color:var(--ink);max-width:80%}
  .user{justify-content:flex-end}
  .user .msg{background:var(--ink);color:#fff;border-radius:16px 16px 4px 16px}
  .user .av{background:var(--sky);color:var(--ink);order:2}
</style></head>
<body><div class="card">
  <div class="chat">
    <div class="av">L</div>
    <div class="msg">Hey! I'm Layla — your AI travel agent ✈️ Tell me where you'd like to go and I'll build you a day-by-day plan in minutes.</div>
  </div>
  <div class="chat user">
    <div class="msg">5 days in Lisbon with my partner, mid-range budget.</div>
    <div class="av">Y</div>
  </div>
  <div class="chat">
    <div class="av">L</div>
    <div class="msg">Perfect choice 🙌 I'll pair boutique stays with sunset viewpoints. Give me 30 seconds…</div>
  </div>
</div></body></html>
