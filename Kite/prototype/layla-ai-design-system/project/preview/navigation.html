<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-md)}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-radius:var(--radius-pill);background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .nav img{height:22px}
  .links{display:flex;gap:20px;font-size:14px;font-weight:500;color:var(--ink)}
  .links a{text-decoration:none;color:inherit}
  .cta{background:var(--ink);color:#fff;border:0;padding:8px 16px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;cursor:pointer}
</style></head>
<body><div class="card">
  <div class="nav">
    <img src="../assets/layla-logo.svg">
    <div class="links"><a>Itineraries</a><a>Road trips</a><a>Blog</a><a>About</a></div>
    <button class="cta">Plan my trip</button>
  </div>
</div></body></html>
