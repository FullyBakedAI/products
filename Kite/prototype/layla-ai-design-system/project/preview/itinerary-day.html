<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:644px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:14px}
  .day{display:flex;gap:14px;padding:14px;background:var(--bone);border-radius:var(--radius-md)}
  .num{width:36px;height:36px;background:var(--ink);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:16px;flex-shrink:0}
  .content h4{margin:0;font-family:var(--font-display);font-size:18px;font-weight:400;color:var(--ink)}
  .content .sub{font-size:13px;color:var(--muted-ink);margin:2px 0 8px}
  .items{display:flex;gap:6px;flex-wrap:wrap}
  .item{background:var(--paper);border:1px solid var(--line);padding:4px 10px;border-radius:var(--radius-pill);font-size:12px;color:var(--ink)}
</style></head>
<body><div class="card">
  <div class="day">
    <div class="num">1</div>
    <div class="content">
      <h4>Arrival & Alfama</h4>
      <div class="sub">Wed, May 7 · Lisbon</div>
      <div class="items"><span class="item">Check-in · Memmo Alfama</span><span class="item">Sunset · Miradouro</span><span class="item">Dinner · Ramiro</span></div>
    </div>
  </div>
  <div class="day">
    <div class="num">2</div>
    <div class="content">
      <h4>Belém & pastries</h4>
      <div class="sub">Thu, May 8 · Lisbon</div>
      <div class="items"><span class="item">Jerónimos Monastery</span><span class="item">Pastéis de Belém</span><span class="item">MAAT · 2h</span></div>
    </div>
  </div>
</div></body></html>
