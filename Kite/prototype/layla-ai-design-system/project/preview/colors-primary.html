<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bone);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:652px;background:var(--paper);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .swatch{flex:1;min-width:0;height:92px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;font-size:12px;font-weight:600}
  .meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted-ink);font-family:var(--font-mono)}
  .label{font-weight:600;font-size:12px;color:inherit}
  .hex{opacity:.75;font-family:var(--font-mono)}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="swatch" style="background:var(--ink);color:#fff"><div class="label">Ink</div><div class="hex">#2A182E</div></div>
    <div class="swatch" style="background:var(--muted-ink);color:#fff"><div class="label">Muted</div><div class="hex">#6B5B6E</div></div>
    <div class="swatch" style="background:var(--faint-ink);color:#fff"><div class="label">Faint</div><div class="hex">#A39AA5</div></div>
    <div class="swatch" style="background:var(--sand);color:var(--ink);border:1px solid var(--line)"><div class="label">Sand</div><div class="hex">#E8DFD3</div></div>
    <div class="swatch" style="background:var(--bone);color:var(--ink);border:1px solid var(--line)"><div class="label">Bone</div><div class="hex">#FAF7F2</div></div>
    <div class="swatch" style="background:var(--paper);color:var(--ink);border:1px solid var(--line)"><div class="label">Paper</div><div class="hex">#FFFFFF</div></div>
  </div>
</div></body></html>
