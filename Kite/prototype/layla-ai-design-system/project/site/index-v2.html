<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kite · Your AI Travel Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="site.css">
<style>
  /* v2 — editorial magazine spin */
  .v2-hero {
    padding: 64px 0 32px;
    position: relative;
  }
  .v2-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 48px;
    align-items: center;
    padding: 0 24px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .v2-h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(52px, 8vw, 108px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    margin: 0;
    color: var(--ink);
  }
  .v2-h1 em { font-style: italic; display: block; }
  .v2-photo {
    aspect-ratio: 4/5;
    border-radius: 28px;
    position: relative;
    overflow: hidden;
  }
  .v2-photo .caption {
    position: absolute; bottom: 20px; left: 20px; right: 20px;
    color: #fff; z-index: 2;
    background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
    padding: 12px 16px; border-radius: 14px;
    font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .v2-strip {
    background: var(--ink); color: #fff;
    padding: 20px 0; overflow: hidden; white-space: nowrap;
    font-family: var(--font-display); font-style: italic;
    font-size: 28px;
  }
  .v2-strip span { padding: 0 40px; opacity: 0.85; }
  .v2-strip span::after { content: '✦'; margin-left: 80px; opacity: 0.4; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="SiteNav.jsx"></script>
<script type="text/babel" src="SiteFooter.jsx"></script>
<script type="text/babel" src="TweaksPanel.jsx"></script>
<script type="text/babel" src="HomeSections.jsx"></script>

<script type="text/babel">
function V2Hero() {
  const [input, setInput] = React.useState('');
  return (
    <section className="v2-hero">
      <div className="v2-grid">
        <div>
          <div className="eyebrow-pill" style={{marginBottom:20}}>No. 042 · April 2026</div>
          <h1 className="v2-h1">
            Where to,
            <em>next?</em>
          </h1>
          <p style={{fontSize:20, color:'var(--muted-ink)', maxWidth:540, marginTop:24, lineHeight:1.55}}>
            Tell Kite your dates and vibe. We design the trip — flights, hotels, the dinners worth staying up for — in the time it takes to pour another coffee.
          </p>

          <div style={{
            maxWidth: 540, marginTop: 32,
            background: '#fff', border: '1.5px solid var(--line)',
            borderRadius: 22, padding: 7,
            display: 'flex', gap: 6, alignItems: 'center',
            boxShadow: 'var(--shadow-md)',
          }}>
            <input
              value={input}
              onChange={e=>setInput(e.target.value)}
              placeholder="e.g. 10 days in Japan, cherry blossom, splurge hotel one night"
              style={{flex:1, border:'none', outline:'none', fontSize:15, padding:'14px 16px', background:'transparent', fontFamily:'var(--font-body)'}}
            />
            <button className="btn btn-primary" style={{borderRadius:16}}>Plan it →</button>
          </div>

          <div style={{display:'flex', gap:20, marginTop:28, fontSize:13, color:'var(--muted-ink)', flexWrap:'wrap'}}>
            <span>★★★★★ 4.9 App Store</span>
            <span>·</span>
            <span>2M+ trips planned</span>
            <span>·</span>
            <span>190+ countries</span>
          </div>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:16}}>
          <div className="v2-photo ph-kyoto">
            <div style={{position:'absolute', inset:0, background:'linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.5) 100%)'}}/>
            <div style={{position:'absolute', top:20, left:20, zIndex:2}}>
              <span className="badge" style={{background:'rgba(255,255,255,0.2)', backdropFilter:'blur(10px)', color:'#fff'}}>Trending · April</span>
            </div>
            <div className="caption">
              <div>
                <div style={{fontFamily:'var(--font-display)', fontStyle:'italic', fontSize:22, color:'#fff'}}>Kyoto, Japan</div>
                <div style={{opacity:0.85, fontSize:12}}>Cherry blossom window · 10 days from €1,800</div>
              </div>
              <div style={{width:36, height:36, borderRadius:'50%', background:'#fff', color:'var(--ink)', display:'flex', alignItems:'center', justifyContent:'center'}}>→</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function V2Strip() {
  return (
    <div className="v2-strip">
      <span>Not another spreadsheet</span>
      <span>Booking in minutes</span>
      <span>Re-routed mid-flight</span>
      <span>24/7 travel companion</span>
      <span>Not another spreadsheet</span>
    </div>
  );
}

function App() {
  React.useEffect(() => {
    let count = 0;
    const t = setInterval(() => {
      window.lucide && window.lucide.createIcons();
      if (++count > 5) clearInterval(t);
    }, 300);
    return () => clearInterval(t);
  }, []);
  return (
    <div data-screen-label="Home v2 — editorial">
      <SiteNav current="home" />
      <V2Hero/>
      <V2Strip/>
      <HowItWorks/>
      <FeaturedDests/>
      <AppPreview/>
      <Testimonials/>
      <FAQ/>
      <FinalCTA/>
      <SiteFooter/>
      <TweaksPanel/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
