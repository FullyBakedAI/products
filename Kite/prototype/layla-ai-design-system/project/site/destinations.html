<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kite · Destinations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="site.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="SiteNav.jsx"></script>
<script type="text/babel" src="SiteFooter.jsx"></script>
<script type="text/babel" src="TweaksPanel.jsx"></script>

<script type="text/babel">
const FILTERS = ['All', 'City break', 'Nature', 'Beach', 'Food', 'Romance', 'Hiking', 'Cultural'];
const MONTHS = ['Any time', 'This month', 'Next month', 'Summer', 'Winter'];

function DestinationsPage() {
  const [filter, setFilter] = React.useState('All');
  const [query, setQuery] = React.useState('');

  const items = window.KITE_DESTINATIONS.filter(d => {
    if (query && !d.city.toLowerCase().includes(query.toLowerCase()) && !d.country.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  });

  return (
    <div data-screen-label="Destinations">
      <SiteNav current="destinations" />

      {/* Hero */}
      <section style={{padding: '72px 24px 48px', textAlign:'center', maxWidth:960, margin:'0 auto'}}>
        <div className="eyebrow-pill" style={{marginBottom:16}}>190+ countries · 10,000+ cities</div>
        <h1 className="display" style={{fontSize:'clamp(44px, 6vw, 80px)'}}>Where to, <em className="display-italic">next?</em></h1>
        <p className="lead" style={{marginTop:16, maxWidth:600, margin:'16px auto 0'}}>Browse what Kite's travelers are loving, or tell us your vibe and we'll design a trip from scratch.</p>

        {/* Search */}
        <div style={{
          maxWidth: 560, margin: '32px auto 0',
          background: '#fff', border: '1.5px solid var(--line)',
          borderRadius: 20, padding: 6,
          display: 'flex', alignItems: 'center', gap: 8,
          boxShadow: 'var(--shadow-sm)',
        }}>
          <input
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search cities, countries, or vibes…"
            style={{
              flex: 1, border: 'none', outline: 'none',
              fontSize: 15, padding: '12px 14px', background: 'transparent',
              fontFamily: 'var(--font-body)',
            }}
          />
          <button className="btn btn-primary btn-sm" style={{borderRadius:14}}>Search</button>
        </div>
      </section>

      {/* Filter bar */}
      <div style={{borderTop:'1px solid var(--line)', borderBottom:'1px solid var(--line)', background:'var(--bone)', position:'sticky', top: 72, zIndex:10, backdropFilter:'blur(10px)'}}>
        <div className="container" style={{display:'flex', gap:8, overflowX:'auto', padding:'14px 24px'}}>
          {FILTERS.map(f => (
            <button key={f} onClick={() => setFilter(f)}
              style={{
                padding:'8px 16px', borderRadius:9999, whiteSpace:'nowrap',
                border:'1px solid ' + (filter===f?'var(--ink)':'var(--line)'),
                background: filter===f?'var(--ink)':'#fff',
                color: filter===f?'#fff':'var(--ink)',
                fontSize:13, fontWeight:500, cursor:'pointer', fontFamily:'var(--font-body)',
              }}>{f}</button>
          ))}
          <div style={{marginLeft:'auto', display:'flex', gap:8}}>
            <select style={{padding:'8px 14px', borderRadius:9999, border:'1px solid var(--line)', fontSize:13, background:'#fff', fontFamily:'var(--font-body)'}}>
              {MONTHS.map(m => <option key={m}>{m}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* Grid */}
      <section style={{padding:'48px 0'}}>
        <div className="container">
          <div className="grid grid-4">
            {items.map(d => (
              <div key={d.city} className="dest-card">
                <div className={'ph ' + d.cls}/>
                <div className="tag">{d.tag}</div>
                <div className="meta">
                  <h4>{d.city}</h4>
                  <div className="sub">{d.country} · {d.days}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Editorial row */}
      <section className="section" style={{background:'var(--sand)'}}>
        <div className="container">
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:48, alignItems:'center'}}>
            <div style={{borderRadius:28, aspectRatio:'4/3', overflow:'hidden', position:'relative'}} className="ph-kyoto"/>
            <div>
              <div className="eyebrow-pill" style={{marginBottom:16}}>Editor's pick · Spring 2026</div>
              <h2 style={{margin:0}}>10 days in <em className="display-italic">Japan,</em> timed for cherry blossom.</h2>
              <p style={{fontSize:18, color:'var(--muted-ink)', marginTop:16}}>
                Tokyo → Kyoto → Kanazawa → back. A ryokan night, a Michelin-starred sushi counter you actually have a chance of getting into, and the walks Kyoto locals take when the tourist spots get busy.
              </p>
              <a href="#" className="btn btn-primary" style={{marginTop:24}}>See the itinerary</a>
            </div>
          </div>
        </div>
      </section>

      <SiteFooter/>
      <TweaksPanel/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DestinationsPage/>);
</script>
</body>
</html>
