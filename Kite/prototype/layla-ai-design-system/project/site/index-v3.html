<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kite · Your AI Travel Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="site.css">
<style>
  /* v3 — BOLD: full-bleed photo wall behind the hero */
  .v3-hero {
    position: relative;
    min-height: 92vh;
    padding: 72px 24px 0;
    overflow: hidden;
  }
  .v3-bg {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 4px;
    z-index: 0;
    opacity: 0.95;
  }
  .v3-bg > div {
    background-size: cover; background-position: center;
  }
  .v3-scrim {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(250,247,242,0.2) 0%, rgba(250,247,242,0.85) 45%, rgba(250,247,242,0.98) 80%);
    z-index: 1;
  }
  .v3-content {
    position: relative; z-index: 2;
    max-width: 900px; margin: 0 auto;
    text-align: center;
    padding-top: 80px;
  }
  .v3-h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(60px, 10vw, 140px);
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin: 0;
    color: var(--ink);
  }
  .v3-h1 em { font-style: italic; }
  .v3-chat {
    max-width: 640px; margin: 40px auto 0;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
    border: 1.5px solid var(--line);
    border-radius: 24; padding: 8px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-hero);
  }
  .v3-ticker {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 2;
    display: flex; gap: 24px; font-size: 12px; color: var(--ink);
    background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
    padding: 8px 20px; border-radius: 9999px;
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .v3-ticker .dot { width:6px; height:6px; border-radius:50%; background: var(--success); display:inline-block; margin-right:6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% {opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="SiteNav.jsx"></script>
<script type="text/babel" src="SiteFooter.jsx"></script>
<script type="text/babel" src="TweaksPanel.jsx"></script>
<script type="text/babel" src="HomeSections.jsx"></script>

<script type="text/babel">
function V3Hero() {
  const [input, setInput] = React.useState('');
  const tiles = ['ph-lisbon','ph-tokyo','ph-bali','ph-iceland','ph-morocco','ph-nyc',
                 'ph-paris','ph-patagonia','ph-kyoto','ph-rome','ph-oslo','ph-cape',
                 'ph-sydney','ph-mex','ph-lisbon','ph-bali','ph-nyc','ph-rome',
                 'ph-tokyo','ph-patagonia','ph-morocco','ph-kyoto','ph-iceland','ph-paris'];
  return (
    <section className="v3-hero">
      <div className="v3-bg">
        {tiles.map((t,i) => <div key={i} className={t}/>)}
      </div>
      <div className="v3-scrim"/>
      <div className="v3-content">
        <div className="eyebrow-pill" style={{marginBottom:24}}>2,847 trips planned today</div>
        <h1 className="v3-h1">
          Anywhere.<br/>
          <em>Ask Kite.</em>
        </h1>
        <p className="lead" style={{marginTop:24, maxWidth:560, marginLeft:'auto', marginRight:'auto'}}>
          The AI travel planner that turns <em style={{fontFamily:'var(--font-display)'}}>"we should go somewhere"</em> into a booked trip in under ten minutes.
        </p>
        <div className="v3-chat">
          <input
            value={input}
            onChange={e => setInput(e.target.value)}
            placeholder="Ask Kite — e.g. surf + sun for under €1,500 in May"
            style={{flex:1, border:'none', outline:'none', fontSize:16, padding:'14px 16px', background:'transparent', fontFamily:'var(--font-body)', color:'var(--ink)'}}
          />
          <button className="btn btn-primary" style={{borderRadius:18}}>Plan a trip →</button>
        </div>
        <div style={{display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap', marginTop:20}}>
          {['5 days in Lisbon','surf trip','family-friendly Japan','cheap Europe in June'].map(c => (
            <button key={c} style={{
              padding:'8px 14px', border:'1px solid var(--line)', background:'rgba(255,255,255,0.7)',
              backdropFilter:'blur(6px)', borderRadius:9999, fontSize:13, fontWeight:500,
              cursor:'pointer', color:'var(--ink)', fontFamily:'var(--font-body)',
            }}>{c}</button>
          ))}
        </div>
      </div>
      <div className="v3-ticker">
        <span><span className="dot"/>Someone just booked 4 nights in Porto</span>
      </div>
    </section>
  );
}

function App() {
  React.useEffect(() => {
    let count = 0;
    const t = setInterval(() => {
      window.lucide && window.lucide.createIcons();
      if (++count > 5) clearInterval(t);
    }, 300);
    return () => clearInterval(t);
  }, []);
  return (
    <div data-screen-label="Home v3 — bold photo wall">
      <SiteNav current="home" />
      <V3Hero/>
      <HowItWorks/>
      <FeaturedDests/>
      <AppPreview/>
      <Testimonials/>
      <FAQ/>
      <FinalCTA/>
      <SiteFooter/>
      <TweaksPanel/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
