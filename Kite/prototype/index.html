<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>California Road Trip · Jun 22–28, 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="layla-ai-design-system/project/colors_and_type.css">
<link rel="stylesheet" href="layla-ai-design-system/project/site/site.css">
<link rel="preload" as="image" href="imgs/bixby.jpg">
<link rel="preload" as="image" href="imgs/battery-spencer.jpg">
<link rel="preload" as="image" href="imgs/corvette.jpg">
<link rel="preload" as="image" href="imgs/ggb.jpg">
<link rel="preload" as="image" href="imgs/glacier-point.jpg">
<link rel="preload" as="image" href="imgs/mcway.jpg">
<link rel="preload" as="image" href="imgs/mist-trail.jpg">
<link rel="preload" as="image" href="imgs/point-lobos.jpg">
<link rel="preload" as="image" href="imgs/tenaya.jpg">
<link rel="preload" as="image" href="imgs/yosemite.jpg">
<style>
  html, body { height: 100%; }
  body { background: var(--bone); color: var(--ink); overflow: hidden; }
  i[class*="ph-"] { vertical-align: middle; }

  /* ============ Shell ============ */
  .rt-shell {
    height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr 460px;
    overflow: hidden;
  }

  /* ============ Sidebar ============ */
  .rt-side {
    background: var(--ink);
    color: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .rt-side-head {
    padding: 24px 22px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .rt-brand {
    display: flex; align-items: center;
    margin-bottom: 20px;
  }
  .rt-brand img { height: 28px; width: auto; }
  .rt-trip-eyebrow {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--coral); font-weight: 600; margin-bottom: 10px;
  }
  .rt-trip-title {
    font-family: var(--font-display); font-weight: 400;
    font-size: 28px; line-height: 1.1;
    color: #fff; letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .rt-trip-title em { font-style: italic; }
  .rt-trip-dates {
    font-size: 13px; color: rgba(255,255,255,0.65);
  }

  .rt-side-nav {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
  }
  .rt-side-label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.38); font-weight: 600;
    padding: 10px 12px 8px;
  }
  .rt-day-item {
    display: grid; grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    color: rgba(255,255,255,0.82);
    transition: background var(--dur-fast), color var(--dur-fast);
    margin-bottom: 2px;
  }
  .rt-day-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .rt-day-item.active {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .rt-day-dot {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-style: italic; font-size: 14px;
    color: rgba(255,255,255,0.6);
  }
  .rt-day-item.active .rt-day-dot {
    background: var(--coral); color: #fff;
  }
  .rt-day-dot.ov {
    background: transparent; border: 1.5px solid rgba(255,255,255,0.25);
    font-size: 13px;
  }
  .rt-day-item.active .rt-day-dot.ov { background: var(--coral); border-color: var(--coral); color: #fff; }
  .rt-day-text { min-width: 0; }
  .rt-day-label { font-size: 14px; font-weight: 500; line-height: 1.2; }
  .rt-day-sub   { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .rt-day-stop-count {
    font-size: 11px; color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums;
  }

  .rt-side-foot {
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 18px 22px;
  }
  .rt-stats {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px 16px;
  }
  .rt-stat-val {
    font-family: var(--font-display); font-size: 22px;
    color: #fff; line-height: 1;
  }
  .rt-stat-lbl {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); font-weight: 600;
    margin-top: 4px;
  }

  /* ============ Main panel ============ */
  .rt-main {
    background: var(--bone);
    overflow-y: auto;
    position: relative;
  }
  .rt-main-head {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,247,242,0.88);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .rt-main-head-left {
    display: flex; align-items: baseline; gap: 14px;
  }
  .rt-main-title {
    font-family: var(--font-display); font-size: 22px;
    line-height: 1; color: var(--ink);
  }
  .rt-main-title em { font-style: italic; }
  .rt-main-sub { font-size: 13px; color: var(--muted-ink); }
  .rt-main-body { padding: 28px 32px 96px; }

  /* Day hero */
  .rt-day-hero {
    position: relative;
    margin: -28px -32px 28px;
    width: calc(100% + 64px);
    height: 260px;
    overflow: hidden;
    background: var(--ink);
  }
  .rt-day-hero img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.82;
  }
  .rt-day-hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(42,24,46,0.22) 0%, transparent 35%, rgba(42,24,46,0.86) 100%);
  }
  .rt-day-hero-text {
    position: absolute; left: 32px; right: 32px; bottom: 28px;
    color: #fff;
  }
  .rt-day-hero-eyebrow {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.8); font-weight: 600;
    margin-bottom: 10px;
  }
  .rt-day-hero-title {
    font-family: var(--font-display); font-size: 44px;
    font-weight: 400; line-height: 1.05; letter-spacing: -0.01em;
    color: #fff;
  }
  .rt-day-hero-title em { font-style: italic; }
  .rt-day-hero-meta {
    font-size: 13px; color: rgba(255,255,255,0.78);
    margin-top: 10px;
  }

  /* Overview section */
  .rt-overview-hero {
    background: linear-gradient(135deg, var(--sand) 0%, var(--coral-soft) 50%, var(--sky-soft) 100%);
    border-radius: var(--radius-lg);
    padding: 36px 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .rt-overview-hero h1 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(36px, 5vw, 52px);
    line-height: 1.02; letter-spacing: -0.02em;
    color: var(--ink); margin: 0 0 14px;
  }
  .rt-overview-hero h1 em { font-style: italic; }
  .rt-overview-hero p {
    font-size: 17px; line-height: 1.55; color: var(--muted-ink);
    max-width: 540px; margin: 0;
  }

  .rt-section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 0 0 20px;
  }
  .rt-section-title {
    font-family: var(--font-display); font-size: 28px;
    font-weight: 400; color: var(--ink);
  }
  .rt-section-title em { font-style: italic; }

  /* Destination cards (overview) */
  /* Timeline */
  .rt-timeline {
    position: relative;
    margin-bottom: 40px;
  }
  .rt-timeline::before {
    content: "";
    position: absolute; left: 15px; top: 0; bottom: 0;
    width: 2px; background: var(--line);
  }
  .rt-tl-day {
    margin-bottom: 8px;
  }
  .rt-tl-day-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; position: relative;
    cursor: pointer;
  }
  .rt-tl-day-header:hover .rt-tl-day-label { color: var(--ink); }
  .rt-tl-dot {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-style: italic; font-size: 13px;
    flex-shrink: 0; z-index: 1; position: relative;
  }
  .rt-tl-day-label {
    font-family: var(--font-display); font-size: 20px;
    color: var(--ink); transition: color 0.15s;
  }
  .rt-tl-day-label em { font-style: italic; }
  .rt-tl-day-sub {
    font-size: 12px; color: var(--muted-ink); margin-left: auto;
  }
  .rt-tl-stops {
    margin-left: 44px;
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 24px;
  }
  .rt-tl-stop {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 10px; align-items: flex-start;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px;
    transition: box-shadow 0.15s;
  }
  .rt-tl-stop:hover { box-shadow: var(--shadow-sm); }
  .rt-tl-stop.drive {
    background: transparent; border-style: dashed;
    opacity: 0.7;
  }
  .rt-tl-icon { font-size: 18px; line-height: 1; margin-top: 1px; }
  .rt-tl-info { min-width: 0; }
  .rt-tl-time {
    font-size: 11px; color: var(--muted-ink); font-weight: 600;
    letter-spacing: 0.05em; margin-bottom: 2px;
  }
  .rt-tl-name {
    font-size: 14px; font-weight: 600; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rt-tl-loc {
    font-size: 12px; color: var(--muted-ink); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rt-tl-thumb {
    width: 52px; height: 52px; border-radius: 8px;
    overflow: hidden; flex-shrink: 0;
  }
  .rt-tl-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .rt-tl-stop { cursor: pointer; }
  .rt-tl-expand {
    grid-column: 1 / -1;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--line);
    font-size: 13px; line-height: 1.6; color: var(--muted-ink);
  }
  .rt-tl-expand-photo {
    width: 100%; height: 160px; border-radius: 10px;
    overflow: hidden; margin-bottom: 10px;
  }
  .rt-tl-expand-photo img { width: 100%; height: 100%; object-fit: cover; }
  .rt-tl-expand-desc { margin-bottom: 10px; }
  .rt-tl-expand-dir {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: var(--ink); color: #fff;
    border-radius: 8px; font-size: 12px; font-weight: 600;
    text-decoration: none; margin-top: 4px;
  }

  .rt-dest-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
    margin-bottom: 40px;
  }
  .rt-dest-card {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    aspect-ratio: 4/5;
    cursor: pointer;
    transition: transform var(--dur-base) var(--ease-out);
    background: var(--ink);
  }
  .rt-dest-card:hover { transform: translateY(-4px); }
  .rt-dest-card img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .rt-dest-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 35%, rgba(42,24,46,0.85) 100%);
  }
  .rt-dest-card .rt-dc-tag {
    position: absolute; top: 14px; left: 14px; z-index: 2;
    background: rgba(255,255,255,0.94); color: var(--ink);
    padding: 5px 12px; border-radius: var(--radius-pill);
    font-size: 11px; font-weight: 700;
  }
  .rt-dest-card .rt-dc-meta {
    position: absolute; left: 20px; right: 20px; bottom: 20px; z-index: 2;
    color: #fff;
  }
  .rt-dest-card h4 {
    font-family: var(--font-display); font-size: 24px;
    font-weight: 400; font-style: italic;
    margin: 0 0 6px; color: #fff;
  }
  .rt-dest-card .rt-dc-sub {
    font-size: 12px; opacity: 0.88; margin-bottom: 10px;
  }
  .rt-dest-card .rt-dc-highlights {
    list-style: none; margin: 0; padding: 0;
    font-size: 12.5px; line-height: 1.55;
    color: rgba(255,255,255,0.88);
  }
  .rt-dest-card .rt-dc-highlights li {
    display: flex; gap: 6px; margin-bottom: 2px;
  }
  .rt-dest-card .rt-dc-highlights li::before {
    content: '·'; opacity: 0.6;
  }

  /* Booking checklist */
  .rt-check-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px 26px;
    margin-bottom: 40px;
  }
  .rt-check-head {
    font-family: var(--font-body); font-weight: 600;
    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted-ink); margin-bottom: 14px;
  }
  .rt-check-list { display: flex; flex-direction: column; gap: 10px; }
  .rt-check-item {
    display: grid; grid-template-columns: 20px 1fr;
    gap: 12px; align-items: flex-start;
    font-size: 14px; color: var(--ink);
  }
  .rt-check-box {
    width: 16px; height: 16px; border-radius: 5px;
    border: 1.5px solid var(--line);
    margin-top: 3px;
    flex-shrink: 0;
    cursor: pointer;
    background: #fff;
    appearance: none; -webkit-appearance: none;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .rt-check-box:checked {
    background: var(--ink);
    border-color: var(--ink);
  }
  .rt-check-box:checked::after {
    content: "";
    position: absolute; left: 3px; top: 1px;
    width: 6px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(42deg);
  }
  .rt-check-item.done .rt-check-text {
    text-decoration: line-through; color: var(--muted-ink);
  }
  .rt-check-text { font-weight: 500; line-height: 1.4; }
  .rt-check-sub { font-size: 12.5px; color: var(--muted-ink); margin-top: 2px; line-height: 1.45; }
  .rt-check-add {
    display: flex; gap: 8px; margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .rt-check-add input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--line);
    border-radius: 8px; font-family: var(--font-body); font-size: 14px;
    background: #fff; color: var(--ink);
    outline: none;
  }
  .rt-check-add input:focus { border-color: var(--ink); }
  .rt-check-add button {
    padding: 8px 14px; background: var(--ink); color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }

  /* Stop cards */
  .rt-stop-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
  }
  .rt-stop-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .rt-stop-img {
    position: relative; height: 220px; overflow: hidden;
    background: linear-gradient(135deg, var(--sand) 0%, var(--coral-soft) 100%);
  }
  .rt-stop-img img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform var(--dur-slow) var(--ease-out);
  }
  .rt-stop-card:hover .rt-stop-img img { transform: scale(1.04); }
  .rt-stop-time {
    position: absolute; bottom: 14px; left: 16px;
    background: rgba(42,24,46,0.78);
    color: #fff; font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: var(--radius-pill);
    font-variant-numeric: tabular-nums;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .rt-stop-icon {
    position: absolute; bottom: 14px; right: 16px;
    font-size: 22px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }
  .rt-stop-body { padding: 20px 24px 22px; }
  .rt-stop-name {
    font-family: var(--font-display); font-size: 22px;
    font-weight: 400; letter-spacing: -0.01em;
    line-height: 1.15;
    color: var(--ink); margin-bottom: 6px;
  }
  .rt-stop-loc {
    font-size: 13px; color: var(--muted-ink);
    margin-bottom: 14px;
  }
  .rt-stop-desc {
    font-size: 14.5px; line-height: 1.65;
    color: var(--muted-ink);
    text-wrap: pretty;
  }

  .rt-stop-card.no-img .rt-stop-body {
    padding: 22px 24px 24px;
  }
  .rt-stop-card.no-img .rt-stop-time-inline {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--sand); color: var(--ink);
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: var(--radius-pill);
    margin-bottom: 12px;
    font-variant-numeric: tabular-nums;
  }

  /* Photo gallery */
  .rt-gallery {
    margin: 16px -24px 0;
    padding: 0 24px 4px;
    display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .rt-gallery::-webkit-scrollbar { display: none; }
  .rt-gallery-thumb {
    position: relative; flex-shrink: 0;
    width: 96px; height: 96px; border-radius: 10px; overflow: hidden;
    cursor: pointer;
  }
  .rt-gallery-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: opacity 0.15s;
  }
  .rt-gallery-thumb:hover img { opacity: 0.85; }
  .rt-gallery-thumb-del {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.6); color: #fff;
    border: none; border-radius: 50%;
    width: 22px; height: 22px; font-size: 12px; line-height: 22px;
    cursor: pointer; text-align: center; display: none;
  }
  .rt-gallery-thumb:hover .rt-gallery-thumb-del { display: block; }
  .rt-gallery-add {
    flex-shrink: 0; width: 96px; height: 96px; border-radius: 10px;
    border: 2px dashed var(--line);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; background: var(--bone);
    transition: border-color 0.15s, background 0.15s;
    font-size: 11px; font-weight: 700; color: var(--muted-ink);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .rt-gallery-add:hover { border-color: var(--coral); background: #FFE8E8; color: var(--coral); }
  .rt-gallery-add-icon { font-size: 24px; line-height: 1; }
  .rt-gallery-add.uploading { opacity: 0.5; pointer-events: none; }

  /* Lightbox */
  .rt-lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    animation: mobFadeIn 0.15s ease;
  }
  .rt-lightbox img {
    max-width: 96vw; max-height: 92vh; border-radius: 6px;
    object-fit: contain;
  }
  .rt-lightbox-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.15); border: none;
    color: #fff; border-radius: 50%;
    width: 40px; height: 40px; font-size: 20px; line-height: 40px;
    cursor: pointer; text-align: center;
  }
  .rt-lightbox-count {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600;
  }

  /* Overlay on card header photo */
  .rt-header-photo-badge {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    background: var(--coral); color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
  }

  /* Stop header with check toggle */
  .rt-stop-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; margin-bottom: 6px;
  }
  .rt-stop-name-wrap { flex: 1; min-width: 0; }
  .rt-stop-check {
    appearance: none; -webkit-appearance: none;
    border: 2px solid var(--line);
    background: var(--paper);
    width: 34px; height: 34px; min-width: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    color: transparent;
    font-size: 18px; font-weight: 700; line-height: 1;
    transition: background var(--dur-fast), border-color var(--dur-fast), color var(--dur-fast), transform var(--dur-fast);
    flex-shrink: 0;
    touch-action: manipulation;
    padding: 0;
  }
  .rt-stop-check:hover { border-color: var(--ink); }
  .rt-stop-check:active { transform: scale(0.92); }
  .rt-stop-check.visited {
    background: #2E6940; border-color: #2E6940; color: #fff;
  }

  /* Visited state on card */
  .rt-stop-card.visited { opacity: 0.62; }
  .rt-stop-card.visited .rt-stop-name {
    text-decoration: line-through;
    text-decoration-color: var(--muted-ink);
    text-decoration-thickness: 2px;
  }
  .rt-stop-card.visited .rt-stop-img img { filter: grayscale(0.4); }

  /* Directions button */
  .rt-stop-actions {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 16px;
  }
  .rt-directions-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    padding: 12px 20px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    text-decoration: none;
    min-height: 44px;
    touch-action: manipulation;
    transition: background var(--dur-fast), transform var(--dur-fast);
    box-shadow: var(--shadow-sm);
  }
  .rt-directions-btn:hover { background: #3d2a43; }
  .rt-directions-btn:active { transform: scale(0.97); }
  .rt-directions-btn-icon {
    font-size: 16px; line-height: 1;
  }

  /* Today badge */
  .rt-today-badge {
    display: inline-flex; align-items: center;
    background: var(--coral); color: #fff;
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 7px; border-radius: var(--radius-pill);
    margin-left: 6px;
    line-height: 1;
  }

  /* Mobile day strip (horizontal scroller shown on mobile) */
  .rt-mobile-daystrip { display: none; }

  /* ============ Edit button + inline edit form ============ */
  .rt-stop-card { position: relative; }
  .rt-stop-edit {
    position: absolute;
    top: 12px; right: 12px;
    z-index: 3;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--line);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px; line-height: 1;
    color: var(--ink);
    padding: 0;
    transition: background var(--dur-fast), transform var(--dur-fast);
    box-shadow: var(--shadow-sm);
  }
  .rt-stop-edit:hover { background: #fff; }
  .rt-stop-edit:active { transform: scale(0.94); }

  .rt-edit-form {
    padding: 22px 24px 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .rt-edit-form-head {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted-ink); font-weight: 600;
    margin-bottom: 2px;
  }
  .rt-edit-row { display: flex; flex-direction: column; gap: 6px; }
  .rt-edit-label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted-ink); font-weight: 600;
  }
  .rt-edit-form input,
  .rt-edit-form textarea {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    width: 100%;
    box-sizing: border-box;
  }
  .rt-edit-form input:focus,
  .rt-edit-form textarea:focus { outline: none; border-color: var(--ink); }
  .rt-edit-form textarea {
    resize: vertical;
    min-height: 84px;
    line-height: 1.5;
  }
  .rt-edit-actions {
    display: flex; gap: 10px; margin-top: 6px;
  }
  .rt-btn-save {
    background: var(--ink); color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    padding: 10px 20px;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 40px;
  }
  .rt-btn-save:hover { background: #3d2a43; }
  .rt-btn-cancel {
    background: transparent; color: var(--ink);
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    padding: 10px 20px;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    cursor: pointer; min-height: 40px;
  }
  .rt-btn-cancel:hover { background: var(--bone); }

  /* Notes block */
  .rt-stop-notes {
    margin-top: 14px;
    background: var(--sand);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
    border-left: 3px solid var(--coral);
  }
  /* Star rating */
  .rt-stars {
    display: flex; gap: 4px; align-items: center; margin: 10px 0 4px;
  }
  .rt-star {
    font-size: 22px; cursor: pointer; line-height: 1;
    transition: transform 0.1s;
    color: #ddd;
  }
  .rt-star.filled { color: #E20000; }
  .rt-star:hover { transform: scale(1.2); }
  .rt-stars-label {
    font-size: 11px; color: var(--muted-ink); font-weight: 600;
    letter-spacing: 0.08em; margin-left: 4px;
  }

  .rt-stop-notes-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted-ink); font-weight: 700;
    margin-bottom: 3px;
  }

  /* Paste confirmation link */
  .rt-paste-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none;
    color: var(--muted-ink);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    padding: 6px 0;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: var(--line);
  }
  .rt-paste-link:hover { color: var(--ink); }

  /* Modal */
  .rt-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(42,24,46,0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .rt-modal {
    background: var(--paper);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 520px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-height: 90vh;
    overflow-y: auto;
  }
  .rt-modal h3 {
    font-family: var(--font-display); font-weight: 400;
    font-size: 24px; color: var(--ink);
    margin: 0 0 6px;
  }
  .rt-modal-sub {
    font-size: 13px; color: var(--muted-ink);
    margin-bottom: 16px;
  }
  .rt-modal-textarea {
    width: 100%;
    min-height: 180px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    box-sizing: border-box;
    resize: vertical;
    line-height: 1.55;
  }
  .rt-modal-textarea:focus { outline: none; border-color: var(--ink); }
  .rt-modal-actions {
    display: flex; gap: 10px; margin-top: 16px;
    justify-content: flex-end; flex-wrap: wrap;
  }
  .rt-modal-error {
    margin-top: 12px;
    padding: 10px 14px;
    background: #FEE2E2;
    border-radius: 8px;
    color: #991B1B;
    font-size: 13px;
    line-height: 1.45;
  }
  .rt-modal-loading {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--sky-soft);
    border-radius: 8px;
    color: var(--sky-strong);
    font-size: 13px;
  }

  /* Settings gear + drawer */
  .rt-settings-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.75);
    height: 34px;
    padding: 0 14px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em;
    margin-top: 14px;
    transition: background var(--dur-fast), color var(--dur-fast);
  }
  .rt-settings-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }

  .rt-settings-drawer {
    position: fixed;
    left: 16px; bottom: 16px;
    width: 320px; max-width: calc(100vw - 32px);
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    z-index: 500;
  }
  .rt-settings-drawer h4 {
    font-family: var(--font-display); font-weight: 400;
    font-size: 20px; margin: 0 0 4px; color: var(--ink);
  }
  .rt-settings-drawer .rt-settings-sub {
    font-size: 12.5px; color: var(--muted-ink);
    margin-bottom: 14px; line-height: 1.45;
  }
  .rt-settings-drawer label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted-ink); font-weight: 600;
    display: block; margin-bottom: 6px;
  }
  .rt-settings-drawer input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--font-body); font-size: 14px;
    color: var(--ink);
    background: #fff;
    box-sizing: border-box;
  }
  .rt-settings-drawer input:focus { outline: none; border-color: var(--ink); }
  .rt-settings-actions {
    display: flex; gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }
  .rt-settings-saved {
    font-size: 12px; color: #2E6940; margin-top: 8px;
  }

  /* Drive connector */
  .rt-drive {
    display: flex; align-items: center; gap: 14px;
    padding: 4px 20px;
    margin: 0 0 16px;
    color: var(--muted-ink);
    font-size: 12.5px; font-weight: 500;
  }
  .rt-drive-line {
    flex: 1; height: 1px; background: var(--line);
  }
  .rt-drive-text { display: flex; align-items: center; gap: 6px; }

  /* Hike profile */
  .rt-hike-profile {
    background: var(--success-soft);
    border: 1px solid #C9E2D2;
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin: 4px 0 16px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .rt-hike-stat { text-align: center; }
  .rt-hike-val {
    font-family: var(--font-display); font-size: 20px;
    color: #2E6940; line-height: 1;
  }
  .rt-hike-lbl {
    font-size: 10px; color: var(--muted-ink); font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 4px;
  }

  /* Swim block */
  .rt-swim-block {
    background: var(--sky-soft);
    border: 1px solid var(--sky);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin: 0 0 16px;
  }
  .rt-swim-eyebrow {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--sky-strong); font-weight: 700;
    margin-bottom: 8px;
  }
  .rt-swim-block p {
    font-size: 13px; color: var(--ink); line-height: 1.6; margin: 0;
  }

  /* Choices (restaurants) */
  .rt-choices-label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 700; color: var(--muted-ink); margin-bottom: 8px;
  }
  .rt-choices {
    display: flex; flex-direction: column; gap: 8px;
    margin: 4px 0 4px;
  }
  .rt-choice {
    background: var(--bone);
    border: 2px solid var(--line);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .rt-choice:hover { border-color: var(--coral); }
  .rt-choice.selected {
    border-color: var(--coral);
    background: #FFE8E8;
  }
  .rt-choice-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 8px; margin-bottom: 4px;
  }
  .rt-choice-name { font-weight: 600; font-size: 14px; color: var(--ink); }
  .rt-choice-price { font-size: 12px; color: var(--muted-ink); font-weight: 600; }
  .rt-choice-loc { font-size: 12px; color: var(--muted-ink); margin-bottom: 4px; }
  .rt-choice-desc { font-size: 13px; color: var(--muted-ink); line-height: 1.55; }
  .rt-choice-tick {
    position: absolute; top: 10px; right: 12px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--coral); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .rt-add-choice {
    margin-top: 8px;
  }
  .rt-add-choice-btn {
    background: none; border: 2px dashed var(--line);
    border-radius: var(--radius-md);
    width: 100%; padding: 10px 14px;
    font-size: 13px; color: var(--muted-ink);
    cursor: pointer; text-align: left;
    transition: border-color 0.15s, color 0.15s;
  }
  .rt-add-choice-btn:hover { border-color: var(--coral); color: var(--coral); }
  .rt-add-choice-form {
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bone); border: 2px solid var(--coral);
    border-radius: var(--radius-md); padding: 12px 14px;
  }
  .rt-add-choice-row {
    display: grid; grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .rt-add-choice-form input {
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; font-family: inherit;
    background: #fff; color: var(--ink);
    width: 100%; box-sizing: border-box;
  }
  .rt-add-choice-form input:focus { outline: none; border-color: var(--coral); }
  .rt-add-choice-actions {
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .rt-add-choice-save {
    background: var(--coral); color: #fff; border: none;
    border-radius: 8px; padding: 8px 16px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  .rt-add-choice-cancel {
    background: none; border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 16px; font-size: 13px;
    color: var(--muted-ink); cursor: pointer;
  }
  .rt-selected-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #FFE8E8; border: 1px solid var(--coral);
    color: var(--coral); border-radius: 20px;
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    margin-bottom: 8px; letter-spacing: 0.04em;
  }

  /* ============ Map panel ============ */
  .rt-map {
    background: linear-gradient(180deg, #EFF6FA 0%, #FAF7F2 100%);
    border-left: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .rt-map-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    z-index: 2;
  }
  .rt-map-eyebrow {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted-ink); font-weight: 600;
  }
  .rt-map-title {
    font-family: var(--font-display); font-size: 22px;
    color: var(--ink); margin-top: 4px;
  }
  .rt-map-title em { font-style: italic; }
  .rt-map-body {
    flex: 1;
    position: relative;
    padding: 0;
    overflow: hidden;
  }
  .rt-leaflet {
    width: 100%;
    height: 100%;
    min-height: 400px;
  }
  .rt-map-foot {
    padding: 14px 22px;
    border-top: 1px solid var(--line);
    background: rgba(255,255,255,0.6);
    display: flex; flex-direction: column; gap: 6px;
    font-size: 12px; color: var(--muted-ink);
  }
  .rt-legend-row {
    display: flex; align-items: center; gap: 8px;
  }
  .rt-legend-swatch {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* ============ Mobile ============ */
  .rt-mobile-nav { display: none; }

  @media (max-width: 1100px) {
    .rt-shell { grid-template-columns: 240px 1fr 400px; }
  }
  @media (max-width: 900px) {
    body { overflow: auto; }
    .rt-shell {
      display: block;
      height: auto;
    }
    /* Hide the full sidebar on mobile — replaced by horizontal day strip */
    .rt-side { display: none; }
    .rt-main, .rt-map {
      height: auto; overflow: visible;
    }
    .rt-map { border-left: none; border-top: 1px solid var(--line); }
    .rt-main-head {
      position: static;
    }
    .rt-day-hero { height: 220px; }
    .rt-day-hero-title { font-size: 36px; }
    .rt-dest-grid { grid-template-columns: 1fr; }
    .rt-main-body { padding: 16px 16px 120px; max-width: none; }
    .rt-day-hero { margin: -16px -16px 20px; }

    /* Mobile day strip — horizontal scroll at top */
    .rt-mobile-daystrip {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      overflow-y: hidden;
      background: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      position: sticky; top: 0; z-index: 20;
    }
    .rt-mobile-daystrip::-webkit-scrollbar { display: none; }
    .rt-mobile-day {
      display: inline-flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      gap: 2px;
      min-width: 86px;
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: none;
      color: rgba(255,255,255,0.75);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      min-height: 56px;
      text-align: left;
    }
    .rt-mobile-day.active {
      background: var(--coral); color: #fff;
    }
    .rt-mobile-day-sub {
      font-size: 10px; font-weight: 500;
      opacity: 0.75; letter-spacing: 0.02em;
    }
    .rt-mobile-day-today {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--coral);
      margin-top: 2px;
    }
    .rt-mobile-day.active .rt-mobile-day-today {
      color: var(--ink);
    }

    /* Hide map desktop placement, show it only when mobile-tab is 'map' */
    body.mobile-tab-overview .rt-map { display: none; }
    body.mobile-tab-map .rt-main { display: none; }
    body.mobile-tab-map .rt-mobile-daystrip { display: none; }

    /* Larger tap targets on mobile */
    .rt-stop-card { margin-bottom: 14px; }
    .rt-stop-img { height: 200px; }
    .rt-stop-body { padding: 18px 18px 20px; }
    .rt-stop-name { font-size: 20px; }

    /* Directions button full-width on mobile */
    .rt-directions-btn {
      width: 100%;
      padding: 16px 20px;
      font-size: 15px;
      min-height: 54px;
    }
    .rt-stop-actions { gap: 10px; }
    .rt-stop-check {
      width: 40px; height: 40px; min-width: 40px;
      font-size: 20px;
    }
    .rt-main-head { padding: 14px 16px; }
    .rt-main-title { font-size: 18px; }

    .rt-mobile-tab { min-height: 56px; }

    .rt-mobile-nav {
      display: flex;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--line);
      z-index: 100;
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      gap: 6px;
    }
    .rt-mobile-tab {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px;
      padding: 10px 12px;
      border-radius: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      color: var(--muted-ink);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .rt-mobile-tab.active {
      background: var(--ink); color: #fff;
    }
    .rt-mobile-tab-icon { font-size: 18px; line-height: 1; }
  }

  /* ============ Print / PDF ============ */
  .rt-print { display: none; }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { height: auto !important; overflow: visible !important; background: #fff !important; }
    .rt-shell, .rt-mobile-daystrip, .rt-mobile-nav { display: none !important; }
    .rt-print { display: block !important; }

    .rt-print-header {
      padding: 32px 0 24px;
      border-bottom: 3px solid #2A182E;
      margin-bottom: 32px;
    }
    .rt-print-eyebrow {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      font-weight: 700; color: #9B6E6E; margin-bottom: 8px;
    }
    .rt-print-title {
      font-family: Georgia, serif; font-size: 36px; line-height: 1.1;
      color: #2A182E; margin-bottom: 6px;
    }
    .rt-print-dates { font-size: 15px; color: #666; }
    .rt-print-stats {
      display: flex; gap: 32px; margin-top: 20px;
    }
    .rt-print-stat-val { font-size: 22px; font-weight: 700; color: #2A182E; }
    .rt-print-stat-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #999; }

    .rt-print-day {
      margin-bottom: 40px;
      page-break-inside: avoid;
    }
    .rt-print-day-head {
      background: #2A182E; color: #fff;
      padding: 12px 18px; border-radius: 8px;
      margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: baseline;
    }

function MapPanel({ activeDay, mobileTab }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const markersRef = useRef([]);
  const polylineRef = useRef(null);

  const allStops = useMemo(() => {
    const out = [];
    TRIP.days.forEach(d => {
      if (!d.stops) return;
      d.stops.forEach(s => {
        if (!s.lat || !s.lng) return;
        if (s.lat > 45) return; // exclude non-US stops (e.g. Heathrow)
        out.push({ ...s, dayId: d.id, dayLabel: d.label, color: DAY_COLORS[d.id] || "#6B5B6E" });
      });
    });
    return out;
  }, []);

  // Invalidate size when mobile Map tab becomes visible
  useEffect(() => {
    if (mobileTab === "map" && leafletRef.current) {
      setTimeout(() => leafletRef.current.invalidateSize(), 50);
    }
  }, [mobileTab]);

  // Init Leaflet once
  useEffect(() => {
    if (leafletRef.current) return;
    const L = window.L;
    const map = L.map(mapRef.current, { zoomControl: true, scrollWheelZoom: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(map);
    leafletRef.current = map;
    return () => { map.remove(); leafletRef.current = null; };
  }, []);

  // Update markers + polyline when activeDay changes
  useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;
    const L = window.L;

    // Clear old
    markersRef.current.forEach(m => m.remove());
    markersRef.current = [];
    if (polylineRef.current) { polylineRef.current.remove(); polylineRef.current = null; }

    const showAll = activeDay === "overview";
    const visible = showAll ? allStops : allStops.filter(s => s.dayId === activeDay);
    if (!visible.length) return;

    // Route polyline — use exact driving route on overview, day stops on day view
    const latlngs = showAll ? FULL_ROUTE : visible.map(s => [s.lat, s.lng]);
    polylineRef.current = L.polyline(latlngs, {
      color: showAll ? "#2A182E" : DAY_COLORS[activeDay] || "#2A182E",
      weight: showAll ? 3 : 3,
      opacity: 0.75,
      dashArray: "6 4",
    }).addTo(map);

    // Markers — only non-drive stops get a visible pin
    visible.forEach(s => {
      if (s.type === "drive") return;
      const icon = L.divIcon({
        className: "",
        html: `<div style="
          width:12px;height:12px;border-radius:50%;
          background:${s.color};border:2px solid #fff;
          box-shadow:0 1px 4px rgba(0,0,0,0.35);
          cursor:pointer;
        "></div>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6],
      });
      const marker = L.marker([s.lat, s.lng], { icon })
        .addTo(map)
        .bindPopup(`<strong style="font-size:13px">${s.name}</strong><br>
          <span style="font-size:11px;color:#666">${s.loc || ""}</span><br>
          <a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}"
             target="_blank" style="font-size:12px;color:#2563EB">Open in Google Maps ↗</a>`);
      marker.on("click", () => marker.openPopup());
      markersRef.current.push(marker);
    });

    // Fit bounds
    const bounds = L.latLngBounds(latlngs);
    map.fitBounds(bounds, { padding: [30, 30] });
  }, [activeDay, allStops]);

  const showAll = activeDay === "overview";
  return (
    <aside className="rt-map">
      <div className="rt-map-head">
        <div className="rt-map-eyebrow">Route</div>
        <div className="rt-map-title">
          {showAll ? <>The <em>whole loop</em></> : <>Day <em>{TRIP.days.find(d=>d.id===activeDay)?.label}</em></>}
        </div>
      </div>
      <div className="rt-map-body">
        <div ref={mapRef} className="rt-leaflet" />
      </div>
      <div className="rt-map-foot">
        <a href={FULL_ROUTE_URL} target="_blank" rel="noopener" style={{
          display: "block", textAlign: "center", padding: "10px 0",
          background: "var(--ink)", color: "#fff", borderRadius: "10px",
          fontWeight: 600, fontSize: "13px", textDecoration: "none",
          marginBottom: "12px", letterSpacing: "0.02em",
        }}>
          Open full route in Google Maps ↗
        </a>
        <div className="rt-legend-row">
          <span className="rt-legend-swatch" style={{background: DAY_COLORS.jun2324}}/>
          San Francisco · Jun 23–24
        </div>
        <div className="rt-legend-row">
          <span className="rt-legend-swatch" style={{background: DAY_COLORS.jun25}}/>
          Big Sur & Monterey · Jun 25
        </div>
        <div className="rt-legend-row">
          <span className="rt-legend-swatch" style={{background: DAY_COLORS.jun26}}/>
          Yosemite — Mist Trail · Jun 26
        </div>
        <div className="rt-legend-row">
          <span className="rt-legend-swatch" style={{background: DAY_COLORS.jun27}}/>
          Yosemite — 4-Mile + Tenaya · Jun 27
        </div>
      </div>
    </aside>
  );
}

function PasteConfirmationModal({ onClose, onParsed }) {
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleImport = async () => {
    setError("");
    if (!text.trim()) { setError("Paste confirmation text first."); return; }
    if (!window.ANTHROPIC_KEY) {
      setError("Add your Anthropic API key in Settings (⚙️) first");
      return;
    }
    setLoading(true);
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "x-api-key": window.ANTHROPIC_KEY || "",
          "anthropic-version": "2023-06-01",
          "content-type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 400,
          messages: [{
            role: "user",
            content: "Extract booking details from this confirmation. Return ONLY valid JSON: {\"name\":\"venue name\",\"loc\":\"full address\",\"time\":\"HH:MM\",\"notes\":\"booking ref and any key details in one line\"}. If a field is not found leave it as empty string. Email/confirmation text: " + text
          }]
        })
      });
      if (!resp.ok) {
        const body = await resp.text();
        throw new Error("API error " + resp.status + ": " + body.slice(0, 200));
      }
      const data = await resp.json();
      let jsonText = (data.content?.[0]?.text || "").trim();
      const fenced = jsonText.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (fenced) jsonText = fenced[1].trim();
      const parsed = JSON.parse(jsonText);
      onParsed({
        name: parsed.name || "",
        loc: parsed.loc || "",
        time: parsed.time || "",
        notes: parsed.notes || "",
      });
    } catch (err) {
      setError("Couldn't parse confirmation: " + (err.message || "unknown error"));
      setLoading(false);
    }
  };

  return (
    <div className="rt-modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="rt-modal" role="dialog" aria-labelledby="rt-modal-title">
        <h3 id="rt-modal-title">Import booking confirmation</h3>
        <div className="rt-modal-sub">Paste a booking email — the details will be extracted and opened in the edit form.</div>
        <textarea
          className="rt-modal-textarea"
          placeholder="Paste your confirmation email here..."
          value={text}
          onChange={(e) => setText(e.target.value)}
          disabled={loading}
        />
        {loading && <div className="rt-modal-loading">Parsing…</div>}
        {error && <div className="rt-modal-error">{error}</div>}
        <div className="rt-modal-actions">
          <button type="button" className="rt-btn-cancel" onClick={onClose} disabled={loading}>Cancel</button>
          <button type="button" className="rt-btn-save" onClick={handleImport} disabled={loading}>
            {loading ? "Parsing…" : "Import details"}
          </button>
        </div>
      </div>
    </div>
  );
}

function StopCard({ stop, stopId, visited, onToggleVisited, customStop, onSaveCustom }) {
  const [editMode, setEditMode] = useState(false);
  const [initialForm, setInitialForm] = useState(null);
  const [showPaste, setShowPaste] = useState(false);
  const [addingChoice, setAddingChoice] = useState(false);
  const [newChoice, setNewChoice] = useState({ name: "", price: "", loc: "", desc: "" });
  const [uploading, setUploading] = useState(false);
  const [lightboxIdx, setLightboxIdx] = useState(null);
  const fileInputRef = useRef(null);

  const custom = customStop || {};
  const display = { ...stop, ...custom };
  const allChoices = [...(display.choices || []), ...(custom.extraChoices || [])];
  const selectedChoice = custom.selectedChoice || null;
  const journalPhotos = custom.journalPhotos || [];

  const handlePhotoUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setUploading(true);
    try {
      const compressed = await Promise.all(files.map(f => compressImage(f)));
      const newPhotos = compressed.map(dataUrl => ({ id: Date.now() + Math.random(), dataUrl, addedAt: new Date().toISOString() }));
      onSaveCustom(stopId, { journalPhotos: [...journalPhotos, ...newPhotos] });
    } catch {
      alert("Couldn't load one of the images — try again.");
    } finally {
      setUploading(false);
      if (fileInputRef.current) fileInputRef.current.value = "";
    }
  };

  const removePhoto = (id) => {
    onSaveCustom(stopId, { journalPhotos: journalPhotos.filter(p => p.id !== id) });
  };

  const selectChoice = (name) => {
    const next = name === selectedChoice ? null : name;
    onSaveCustom(stopId, { selectedChoice: next });
  };

  const saveNewChoice = () => {
    if (!newChoice.name.trim()) return;
    const extras = [...(custom.extraChoices || []), { ...newChoice }];
    onSaveCustom(stopId, { extraChoices: extras, selectedChoice: newChoice.name });
    setNewChoice({ name: "", price: "", loc: "", desc: "" });
    setAddingChoice(false);
  };

  const headerPhoto = journalPhotos[0]?.dataUrl || display.photo;
  const hasImg = !!headerPhoto;
  const hasJournalPhotos = journalPhotos.length > 0;
  const hasCoords = typeof display.lat === "number" && typeof display.lng === "number";
  const directionsUrl = hasCoords
    ? `https://www.google.com/maps/dir/?api=1&destination=${display.lat},${display.lng}&travelmode=driving`
    : null;

  const openEdit = (prefill) => {
    setInitialForm({
      name: prefill?.name ?? (display.name || ""),
      loc: prefill?.loc ?? (display.loc || ""),
      time: prefill?.time ?? (display.time || ""),
      notes: prefill?.notes ?? (display.notes || ""),
    });
    setEditMode(true);
  };

  const handleSave = (fields) => {
    onSaveCustom(stopId, fields);
    setEditMode(false);
    setInitialForm(null);
  };

  const handleCancel = () => {
    setEditMode(false);
    setInitialForm(null);
  };

  if (editMode) {
    return (
      <article className={"rt-stop-card editing" + (hasImg ? "" : " no-img")}>
        <StopEditForm
          initial={initialForm || {}}
          onSave={handleSave}
          onCancel={handleCancel}
        />
      </article>
    );
  }

  return (
    <article className={"rt-stop-card" + (hasImg ? "" : " no-img") + (visited ? " visited" : "")}>
      <button
        type="button"
        className="rt-stop-edit"
        aria-label="Edit stop"
        onClick={() => openEdit()}
      ><i className="ph-fill ph-pencil-simple"></i></button>
      {hasImg && (
        <div className="rt-stop-img">
          <img src={headerPhoto} alt={display.name} loading="lazy"/>
          {hasJournalPhotos && <div className="rt-header-photo-badge"><i className="ph-fill ph-camera"></i> {journalPhotos.length} photo{journalPhotos.length > 1 ? "s" : ""}</div>}
          {display.time && !hasJournalPhotos && <div className="rt-stop-time">{display.time}</div>}
          {display.icon && !hasJournalPhotos && <div className="rt-stop-icon"><i className={"ph-fill " + display.icon}></i></div>}
        </div>
      )}
      <div className="rt-stop-body">
        {!hasImg && display.time && (
          <div className="rt-stop-time-inline">{display.icon && <span><i className={"ph-fill " + display.icon}></i></span>}{display.time}</div>
        )}

        {/* Photo gallery strip */}
        <div className={`rt-gallery${uploading ? " uploading" : ""}`}>
          {journalPhotos.map((p, idx) => (
            <div key={p.id} className="rt-gallery-thumb">
              <img src={p.dataUrl} alt={`Photo ${idx+1}`} onClick={() => setLightboxIdx(idx)}/>
              <button type="button" className="rt-gallery-thumb-del"
                onClick={e => { e.stopPropagation(); removePhoto(p.id); }}>✕</button>
            </div>
          ))}
          <label className={`rt-gallery-add${uploading ? " uploading" : ""}`}>
            <span className="rt-gallery-add-icon">{uploading ? <i className="ph-fill ph-spinner"></i> : <i className="ph-fill ph-camera"></i>}</span>
            {uploading ? "Saving…" : "Add photos"}
            <input ref={fileInputRef} type="file" accept="image/*" multiple
              style={{display:"none"}} onChange={handlePhotoUpload}/>
          </label>
        </div>
        <div className="rt-stop-header">
          <div className="rt-stop-name-wrap">
            <h3 className="rt-stop-name">{display.name}</h3>
            <div className="rt-stop-loc">{display.loc}</div>
          </div>
          <button
            type="button"
            className={"rt-stop-check" + (visited ? " visited" : "")}
            aria-label={visited ? "Mark as not visited" : "Mark as visited"}
            aria-pressed={visited}
            onClick={() => onToggleVisited(stopId)}
          >✓</button>
        </div>

        {display.hike && (
          <div className="rt-hike-profile">
            <div className="rt-hike-stat">
              <div className="rt-hike-val">{display.hike.distance}</div>
              <div className="rt-hike-lbl">Distance</div>
            </div>
            <div className="rt-hike-stat">
              <div className="rt-hike-val">{display.hike.gain}</div>
              <div className="rt-hike-lbl">Elevation</div>
            </div>
            <div className="rt-hike-stat">
              <div className="rt-hike-val">{display.hike.time}</div>
              <div className="rt-hike-lbl">Duration</div>

            <div className="rt-swim-eyebrow">Wild swim</div>

          </div>
        )}

        {(allChoices.length > 0 || display.choices) && (
          <div style={{marginTop: 14}}>
            <div className="rt-choices-label">
              {selectedChoice ? (
                <span className="rt-selected-badge">✓ {selectedChoice}</span>
              ) : "Where to eat"}
            </div>
            <div className="rt-choices">
              {allChoices.map(c => {
                const isSel = c.name === selectedChoice;
                return (
                  <div
                    key={c.name}
                    className={"rt-choice" + (isSel ? " selected" : "")}
                    onClick={() => selectChoice(c.name)}
                  >
                    {isSel && <div className="rt-choice-tick">✓</div>}
                    <div className="rt-choice-head">
                      <span className="rt-choice-name">{c.name}</span>
                      <span className="rt-choice-price">{c.price}</span>
                    </div>
                    {c.loc && <div className="rt-choice-loc">{c.loc}</div>}
                    {c.desc && <div className="rt-choice-desc">{c.desc}</div>}
                  </div>
                );
              })}
            </div>
            <div className="rt-add-choice">
              {!addingChoice ? (
                <button className="rt-add-choice-btn" onClick={() => setAddingChoice(true)}>
                  + Add option
                </button>
              ) : (
                <div className="rt-add-choice-form">
                  <input
                    placeholder="Restaurant name *"
                    value={newChoice.name}
                    onChange={e => setNewChoice(p => ({...p, name: e.target.value}))}
                    autoFocus
                  />
                  <div className="rt-add-choice-row">
                    <input
                      placeholder="Location / address"

                    />
                    <input
                      placeholder="$$"

                      onChange={e => setNewChoice(p => ({...p, price: e.target.value}))}
                    />
                  </div>
                  <input
                    placeholder="Notes (optional)"
                    value={newChoice.desc}
                    onChange={e => setNewChoice(p => ({...p, desc: e.target.value}))}
                  />
                  <div className="rt-add-choice-actions">
                    <button className="rt-add-choice-cancel" onClick={() => { setAddingChoice(false); setNewChoice({ name:"", price:"", loc:"", desc:"" }); }}>Cancel</button>
                    <button className="rt-add-choice-save" onClick={saveNewChoice}>Add</button>
                  </div>
                </div>
              )}
            </div>

// Returns the trip day id for today, or null if today isn't a trip day.
function getTodayDayId() {
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth(); // 0-indexed; June = 5
  const d = today.getDate();
  if (y !== 2026 || m !== 5) return null;
  if (d === 22) return "jun22";
  if (d === 23 || d === 24) return "jun2324";
  if (d === 25) return "jun25";
  if (d === 26) return "jun26";
  if (d === 27) return "jun27";
  if (d === 28) return "jun28";
  return null;
}

const VISITED_KEY = "trip-visited";
const CUSTOM_KEY = "trip-custom";
const API_KEY_STORAGE = "trip-anthropic-key";

function loadVisited() {
  try {
    const raw = localStorage.getItem(VISITED_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.filter(x => typeof x === "string") : [];
  } catch {
    return [];
  }
}

function compressImage(file, maxWidth = 1200, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function loadCustom() {
  try {
    const raw = localStorage.getItem(CUSTOM_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return (parsed && typeof parsed === "object" && !Array.isArray(parsed)) ? parsed : {};
  } catch {
    return {};
  }
}

function App() {
  const [activeDay, setActiveDay] = useState("overview");
  const [mobileTab, setMobileTab] = useState("overview");
  const [todayDayId, setTodayDayId] = useState(null);
  const [visited, setVisited] = useState([]);
  const [customStops, setCustomStops] = useState({});
  const [showSettings, setShowSettings] = useState(false);
  const [checklistDone, setChecklistDone] = useState([]);
  const [checklistExtra, setChecklistExtra] = useState([]);

  // Auto-select today's day on mount (fall back to overview if outside trip window)
  useEffect(() => {
    const today = getTodayDayId();
    setTodayDayId(today);
    setActiveDay(today || "overview");
  }, []);

  // Load visited stops + custom edits from localStorage; seed API key
  useEffect(() => {
    setVisited(loadVisited());
    setCustomStops(loadCustom());
    try { const d = localStorage.getItem("trip-checklist-done"); if (d) setChecklistDone(JSON.parse(d)); } catch {}
    try { const e = localStorage.getItem("trip-checklist-extra"); if (e) setChecklistExtra(JSON.parse(e)); } catch {}
    try {
      window.ANTHROPIC_KEY = localStorage.getItem(API_KEY_STORAGE) || "";
    } catch {
      window.ANTHROPIC_KEY = "";
    }
  }, []);

  // Unregister any stale service workers — Vercel no-store headers handle caching
  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
  }, []);

  useEffect(() => {
    document.body.classList.remove("mobile-tab-overview", "mobile-tab-map");
    document.body.classList.add("mobile-tab-" + mobileTab);
  }, [mobileTab]);

  const toggleVisited = (stopId) => {
    setVisited(prev => {
      const next = prev.includes(stopId)
        ? prev.filter(id => id !== stopId)
        : [...prev, stopId];
      try { localStorage.setItem(VISITED_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const setCustomStop = (stopId, fields) => {
    setCustomStops(prev => {
      const next = { ...prev, [stopId]: { ...(prev[stopId] || {}), ...fields } };
      try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const toggleChecklistItem = (id) => {
    setChecklistDone(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      try { localStorage.setItem("trip-checklist-done", JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const addChecklistItem = (text) => {
    const id = "custom-" + Date.now();
    setChecklistExtra(prev => {
      const next = [...prev, { id, text }];
      try { localStorage.setItem("trip-checklist-extra", JSON.stringify(next)); } catch {}
      return next;
    });
  };

  return (
    <>
      <div className="rt-shell">
        <TripSidebar
          activeDay={activeDay}
          setActiveDay={setActiveDay}
          todayDayId={todayDayId}
          onOpenSettings={() => setShowSettings(true)}
        />
        <MobileDayStrip
          activeDay={activeDay}
          setActiveDay={setActiveDay}
          todayDayId={todayDayId}
        />
        <MainPanel
          activeDay={activeDay}
          setActiveDay={setActiveDay}
          visited={visited}
          onToggleVisited={toggleVisited}
          customStops={customStops}
          onSaveCustom={setCustomStop}
          checklistDone={checklistDone}
          checklistExtra={checklistExtra}
          onToggleChecklistItem={toggleChecklistItem}
          onAddChecklistItem={addChecklistItem}
        />
        <MapPanel activeDay={activeDay} mobileTab={mobileTab}/>
      </div>
      <MobileNav tab={mobileTab} setTab={setMobileTab}/>
      {showSettings && <SettingsDrawer onClose={() => setShowSettings(false)}/>}
      <PrintView customStops={customStops} checklistDone={checklistDone} checklistExtra={checklistExtra}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
