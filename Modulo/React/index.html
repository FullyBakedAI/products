<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Modulo — Swap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0D0E17;color:#F04348;padding:32px;font:14px/1.6 monospace;z-index:9999;overflow:auto"><b>JS Error:</b><br>' + (e.message || e) + '<br><br>' + (e.filename || '') + ':' + (e.lineno || '') + '<br><br><pre>' + (e.error && e.error.stack ? e.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0D0E17;color:#F04348;padding:32px;font:14px/1.6 monospace;z-index:9999;overflow:auto"><b>Unhandled Promise:</b><br>' + (e.reason || e) + '</div>';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
