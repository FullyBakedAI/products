<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Modulo — Swap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="modulo-shared.css">
  <style>
    /* ── FIX 1: Header — X + "Swap" grouped left, settings right ─────── */
    .swap-header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 20px 20px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .close-btn {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .swap-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--bk-text-primary);
      white-space: nowrap;
    }

    /* ── FIX 2: Settings icon — larger hit area, bigger icon ──────────── */
    .settings-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .settings-btn:hover {
      background: var(--bk-bg-card);
    }

    /* ── Swap Cards ─────────────────────────────────────────────────────── */
    .swap-cards {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .swap-card {
      background: linear-gradient(180deg, var(--bk-bg-card), var(--bk-bg-card-alt));
      border: 1px solid var(--bk-border-subtle);
      border-radius: 16px;
      padding: 16px 16px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── FIX 3: Card heights from Figma spec ─────────────────────────── */
    .swap-card.pay-card     { height: 138px; }
    .swap-card.receive-card { height: 114px; }

    .card-label {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--bk-text-secondary);
      opacity: 0.6;
      margin-bottom: 8px;
    }

    .card-middle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .swap-amount {
      font-size: 36px;
      font-weight: 300;
      line-height: 1.2;
      color: var(--bk-text-primary);
      width: 100%;
    }

    .swap-amount::placeholder { color: rgba(135, 135, 140, 0.4); }
    .swap-amount.dimmed       { color: rgba(135, 135, 140, 0.4); }

    .token-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .token-icon svg { width: 22px; height: 22px; }

    .token-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--bk-text-primary);
    }

    .token-chevron {
      width: 13px;
      height: 13px;
      stroke: var(--bk-text-secondary);
      flex-shrink: 0;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--bk-text-secondary);
      opacity: 0.7;
    }

    /* ── FIX 4: Swap direction — centered button, spring animation ───── */
    .swap-direction-row {
      height: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
      position: relative;
      z-index: 2;
    }

    .swap-direction {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--bk-bg-base);
      border: 1px solid var(--bk-border-pill);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s ease;
      flex-shrink: 0;
    }

    .swap-direction:hover { background: var(--bk-pill-bg); }

    /* ── Percentage Buttons ─────────────────────────────────────────────── */
    .pct-row {
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
    }

    /* ── Numpad ──────────────────────────────────────────────────────────── */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 16px 24px 0;
      flex: 1;
    }

    .numpad-key {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 400;
      color: var(--bk-text-primary);
      background: transparent;
      border-radius: 12px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s ease;
    }

    .numpad-key:active {
      background: var(--bk-bg-card);
      transform: scale(0.88);
    }

    /* Token appear animation */
    @keyframes tokenAppear {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .token-pill.appear {
      animation: tokenAppear 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Receive value flash */
    @keyframes valueUpdate {
      0%   { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .receive-flash {
      animation: valueUpdate 0.2s ease-out forwards;
    }
  </style>
</head>
<body>

  <div class="phone" role="main" aria-label="Modulo swap screen">

    <!-- ── Status Bar ────────────────────────────────────────────────── -->
    <div class="status-bar" aria-hidden="true">
      <span class="status-time">9:41</span>
      <div class="status-right">
        <div class="signal-bars">
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
        </div>
        <img src="assets/icon-wifi.svg" alt="" width="16" height="12">
        <div class="battery">
          <div class="battery-fill"></div>
        </div>
      </div>
    </div>

    <!-- ── FIX 1: Header — X + "Swap" grouped left, settings right ── -->
    <div class="swap-header">
      <div class="header-left">
        <a href="home-screen.html" class="close-btn" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M15 5L5 15" stroke="#87878C" stroke-width="1.667" stroke-linecap="round"/>
            <path d="M5 5L15 15" stroke="#87878C" stroke-width="1.667" stroke-linecap="round"/>
          </svg>
        </a>
        <span class="swap-title">Swap</span>
      </div>
      <!-- FIX 2: Settings — 30px icon in 38×38 hit area -->
      <button class="settings-btn" aria-label="Settings">
        <svg width="30" height="30" viewBox="3 3 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.1375 10.75H16.8625C16.531 10.75 16.213 10.8817 15.9786 11.1161C15.7442 11.3505 15.6125 11.6685 15.6125 12V12.1125C15.6123 12.3317 15.5544 12.547 15.4447 12.7368C15.335 12.9266 15.1773 13.0841 14.9875 13.1937L14.7188 13.35C14.5287 13.4597 14.3132 13.5175 14.0938 13.5175C13.8743 13.5175 13.6588 13.4597 13.4688 13.35L13.375 13.3C13.0882 13.1345 12.7474 13.0897 12.4275 13.1752C12.1076 13.2607 11.8347 13.4697 11.6688 13.7562L11.5313 13.9938C11.3658 14.2806 11.3209 14.6214 11.4064 14.9412C11.492 15.2611 11.701 15.534 11.9875 15.7L12.0813 15.7625C12.2702 15.8716 12.4273 16.0282 12.5369 16.2168C12.6466 16.4054 12.7049 16.6194 12.7063 16.8375V17.1562C12.7071 17.3765 12.6498 17.5931 12.54 17.7841C12.4303 17.975 12.272 18.1336 12.0813 18.2437L11.9875 18.3C11.701 18.466 11.492 18.7389 11.4064 19.0588C11.3209 19.3786 11.3658 19.7194 11.5313 20.0062L11.6688 20.2438C11.8347 20.5303 12.1076 20.7393 12.4275 20.8248C12.7474 20.9103 13.0882 20.8655 13.375 20.7L13.4688 20.65C13.6588 20.5403 13.8743 20.4825 14.0938 20.4825C14.3132 20.4825 14.5287 20.5403 14.7188 20.65L14.9875 20.8063C15.1773 20.9159 15.335 21.0734 15.4447 21.2632C15.5544 21.453 15.6123 21.6683 15.6125 21.8875V22C15.6125 22.3315 15.7442 22.6495 15.9786 22.8839C16.213 23.1183 16.531 23.25 16.8625 23.25H17.1375C17.469 23.25 17.787 23.1183 18.0214 22.8839C18.2558 22.6495 18.3875 22.3315 18.3875 22V21.8875C18.3877 21.6683 18.4456 21.453 18.5553 21.2632C18.665 21.0734 18.8227 20.9159 19.0125 20.8063L19.2813 20.65C19.4713 20.5403 19.6868 20.4825 19.9063 20.4825C20.1257 20.4825 20.3412 20.5403 20.5313 20.65L20.625 20.7C20.9118 20.8655 21.2526 20.9103 21.5725 20.8248C21.8924 20.7393 22.1653 20.5303 22.3313 20.2438L22.4688 20C22.6342 19.7132 22.6791 19.3724 22.5936 19.0525C22.508 18.7326 22.299 18.4597 22.0125 18.2937L21.9188 18.2437C21.728 18.1336 21.5697 17.975 21.46 17.7841C21.3502 17.5931 21.2929 17.3765 21.2938 17.1562V16.8438C21.2929 16.6235 21.3502 16.4069 21.46 16.2159C21.5697 16.025 21.728 15.8664 21.9188 15.7563L22.0125 15.7C22.299 15.534 22.508 15.2611 22.5936 14.9412C22.6791 14.6214 22.6342 14.2806 22.4688 13.9938L22.3313 13.7562C22.1653 13.4697 21.8924 13.2607 21.5725 13.1752C21.2526 13.0897 20.9118 13.1345 20.625 13.3L20.5313 13.35C20.3412 13.4597 20.1257 13.5175 19.9063 13.5175C19.6868 13.5175 19.4713 13.4597 19.2813 13.35L19.0125 13.1937C18.8227 13.0841 18.665 12.9266 18.5553 12.7368C18.4456 12.547 18.3877 12.3317 18.3875 12.1125V12C18.3875 11.6685 18.2558 11.3505 18.0214 11.1161C17.787 10.8817 17.469 10.75 17.1375 10.75Z" stroke="#87878C" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 18.875C18.0355 18.875 18.875 18.0355 18.875 17C18.875 15.9645 18.0355 15.125 17 15.125C15.9645 15.125 15.125 15.9645 15.125 17C15.125 18.0355 15.9645 18.875 17 18.875Z" stroke="#87878C" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- ── Swap Cards ───────────────────────────────────────────────── -->
    <div class="swap-cards">
      <!-- You Pay — FIX 3: height 138px from Figma spec -->
      <div class="swap-card pay-card" role="region" aria-label="You pay">
        <div class="card-label">You pay</div>
        <div class="card-middle">
          <input type="text" class="swap-amount" id="pay-amount" placeholder="0" readonly>
          <div class="token-pill" id="pay-token" role="button" aria-label="Select pay token: ETH">
            <div class="token-icon">
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#eth-a)">
                  <path d="M10.9922 20.1562C16.0534 20.1562 20.1562 16.0534 20.1562 10.9922C20.1562 5.93102 16.0534 1.82812 10.9922 1.82812C5.93102 1.82812 1.82812 5.93102 1.82812 10.9922C1.82812 16.0534 5.93102 20.1562 10.9922 20.1562Z" fill="#627EEA"/>
                </g>
                <g clip-path="url(#eth-b)">
                  <path d="M11.3073 18.5509L16.0313 12.0154L11.3076 14.7556L6.58594 12.0154L11.3073 18.5509Z" fill="white"/>
                  <path fill-rule="evenodd" clip-rule="evenodd" d="M11.3076 3.44116L16.0278 11.1359L11.3076 13.8769L6.5863 11.1362L11.3076 3.44116Z" fill="white"/>
                </g>
                <defs>
                  <clipPath id="eth-a"><rect width="18.3281" height="18.3281" fill="white" transform="translate(1.82812 1.82812)"/></clipPath>
                  <clipPath id="eth-b"><rect width="9.44531" height="15.1172" fill="white" transform="translate(6.58594 3.4375)"/></clipPath>
                </defs>
              </svg>
            </div>
            <span class="token-name">ETH</span>
            <svg class="token-chevron" viewBox="0 0 13 13" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,4 6.5,8.5 11,4"/>
            </svg>
          </div>
        </div>
        <div class="card-bottom">
          <span id="pay-usd">&asymp; $0.00</span>
          <span>1.1421 ETH</span>
        </div>
      </div>

      <!-- FIX 4: Swap direction — 36×36 button, spring animation -->
      <div class="swap-direction-row">
        <button class="swap-direction" id="swap-dir" aria-label="Swap direction">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 1V15" stroke="#B3B2B8" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M11.5 10.5L7 15L2.5 10.5" stroke="#B3B2B8" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- You Receive — FIX 3: height 114px from Figma spec -->
      <div class="swap-card receive-card" role="region" aria-label="You receive">
        <div class="card-label">You receive</div>
        <div class="card-middle">
          <input type="text" class="swap-amount dimmed" id="receive-amount" placeholder="0" readonly>
          <a href="swap-select-screen.html" class="select-token-cta" id="receive-token" role="button">
            <span>Select token</span>
          </a>
        </div>
        <div class="card-bottom" id="receive-rate">
          <span>&nbsp;</span>
          <span id="receive-rate-text">&nbsp;</span>
        </div>
      </div>
    </div>

    <!-- ── Percentage Buttons ───────────────────────────────────────── -->
    <div class="pct-row" role="group" aria-label="Amount presets">
      <button class="pct-pill" data-pct="25">25%</button>
      <button class="pct-pill" data-pct="50">50%</button>
      <button class="pct-pill" data-pct="75">75%</button>
      <button class="pct-pill" data-pct="100">Max</button>
    </div>

    <!-- ── Numpad ───────────────────────────────────────────────────── -->
    <div class="numpad" role="group" aria-label="Number pad">
      <button class="numpad-key" data-key="1">1</button>
      <button class="numpad-key" data-key="2">2</button>
      <button class="numpad-key" data-key="3">3</button>
      <button class="numpad-key" data-key="4">4</button>
      <button class="numpad-key" data-key="5">5</button>
      <button class="numpad-key" data-key="6">6</button>
      <button class="numpad-key" data-key="7">7</button>
      <button class="numpad-key" data-key="8">8</button>
      <button class="numpad-key" data-key="9">9</button>
      <button class="numpad-key" data-key=".">.</button>
      <button class="numpad-key" data-key="0">0</button>
      <button class="numpad-key" data-key="del" aria-label="Delete">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1L1 8L8 15" stroke="#B3B2B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 8H21" stroke="#B3B2B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- ── Bottom CTA ───────────────────────────────────────────────── -->
    <button class="bottom-cta disabled" id="swap-btn">Select a token</button>

  </div><!-- /.phone -->

  <script>
    const payInput = document.getElementById('pay-amount');
    const receiveInput = document.getElementById('receive-amount');
    const swapBtn = document.getElementById('swap-btn');
    const swapDir = document.getElementById('swap-dir');
    const pills = document.querySelectorAll('.pct-pill');
    const balance = 1.1421;
    const ethPrice = 1842.50;
    let selectedToken = null;
    let swapped = false;

    // Keypad
    document.querySelectorAll('.numpad-key').forEach(key => {
      key.addEventListener('click', () => {
        const k = key.dataset.key;
        let val = payInput.value;
        if (k === 'del') {
          val = val.slice(0, -1);
        } else if (k === '.') {
          if (!val.includes('.')) val += val.length === 0 ? '0.' : '.';
        } else {
          if (val === '0' && k !== '.') val = k;
          else val += k;
        }
        payInput.value = val;
        pills.forEach(p => p.classList.remove('active'));
        updateState();
      });
    });

    // Percentage pills
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        const pct = parseInt(pill.dataset.pct);
        const amount = balance * pct / 100;
        payInput.value = amount % 1 === 0 ? amount.toString() : amount.toFixed(4);
        updateState();
      });
    });

    // Swap direction — smooth spring toggle
    swapDir.addEventListener('click', () => {
      swapped = !swapped;
      swapDir.style.transform = swapped ? 'rotate(180deg)' : 'rotate(0deg)';
    });

    // Select token — appear animation (intercept link for inline demo)
    document.getElementById('receive-token').addEventListener('click', (e) => {
      e.preventDefault();
      selectedToken = 'USDC';
      document.getElementById('receive-token').outerHTML = `
        <div class="token-pill appear" id="receive-token">
          <div class="token-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <circle cx="11" cy="11" r="9" fill="#2775CA"/>
              <text x="11" y="15.5" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="Inter,sans-serif">$</text>
            </svg>
          </div>
          <span class="token-name">USDC</span>
          <svg class="token-chevron" viewBox="0 0 13 13" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,4 6.5,8.5 11,4"/>
          </svg>
        </div>
      `;
      receiveInput.classList.remove('dimmed');
      const rateText = document.getElementById('receive-rate-text');
      if (rateText) rateText.textContent = '1 ETH ≈ $1,842.50';
      updateState();
    });

    function updateState() {
      const hasAmount = payInput.value && parseFloat(payInput.value) > 0;
      const usdVal = hasAmount ? parseFloat(payInput.value) * ethPrice : 0;

      // Update pay USD
      const payUsd = document.getElementById('pay-usd');
      if (payUsd) payUsd.textContent = `≈ $${usdVal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

      // Update receive amount with flash
      if (selectedToken && hasAmount) {
        const newVal = (parseFloat(payInput.value) * ethPrice).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        if (receiveInput.value !== newVal) {
          receiveInput.value = newVal;
          receiveInput.classList.remove('receive-flash');
          void receiveInput.offsetWidth;
          receiveInput.classList.add('receive-flash');
        }
      }

      // CTA state machine
      if (!selectedToken) {
        swapBtn.textContent = 'Select a token';
        swapBtn.className = 'bottom-cta disabled';
        swapBtn.onclick = () => window.location.href = 'swap-select-screen.html';
      } else if (!hasAmount) {
        swapBtn.textContent = 'Enter an amount';
        swapBtn.className = 'bottom-cta disabled';
        swapBtn.onclick = null;
      } else {
        swapBtn.textContent = 'Swap';
        swapBtn.className = 'bottom-cta ready';
      }
    }
  </script>

</body>
</html>
