<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Modulo — Send</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="modulo-shared.css">
  <style>
    /* ── Header ─────────────────────────────────────────────────────────── */
    .send-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 0;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--bk-text-primary);
    }

    /* ── Search Field (margin + active border override) ─────────────────── */
    .search-field {
      margin: 16px 20px 0;
      border-color: var(--bk-border-active);
    }

    .search-field .placeholder {
      flex: 1;
    }

    .search-field .scan-btn {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-field .scan-btn img {
      width: 18px;
      height: 18px;
      opacity: 1;
    }

    /* ── Recent Section ─────────────────────────────────────────────────── */
    .recent-label {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--bk-text-muted);
      opacity: 0.7;
      padding: 20px 20px 8px;
    }

    /* ── Contact List ───────────────────────────────────────────────────── */
    .contact-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding: 0 20px;
    }

    .contact-list::-webkit-scrollbar {
      display: none;
    }

    .contact-row {
      display: flex;
      align-items: center;
      padding: 0;
      gap: 16px;
      height: 77px;
      border-bottom: 1px solid var(--bk-border-subtle);
    }

    .contact-row:last-child {
      border-bottom: none;
    }

    /* Colour variants for different contacts */
    .avatar-variant-1 img.avatar {
      filter: hue-rotate(180deg) saturate(1.2);
    }

    .avatar-variant-3 img.avatar {
      filter: hue-rotate(90deg) saturate(1.3);
    }

    .contact-text {
      flex: 1;
      min-width: 0;
    }

    .contact-name {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--bk-text-primary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .contact-sub {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--bk-text-secondary);
    }
  </style>
</head>
<body>

  <div class="phone" role="main" aria-label="Modulo send screen">

    <!-- ── Status Bar ────────────────────────────────────────────────── -->
    <div class="status-bar" aria-hidden="true">
      <span class="status-time">9:41</span>
      <div class="status-right">
        <div class="signal-bars">
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
        </div>
        <img src="assets/icon-wifi.svg" alt="" width="16" height="12">
        <div class="battery">
          <div class="battery-fill"></div>
        </div>
      </div>
    </div>

    <!-- ── Drag Handle (sheet indicator from Figma) ──────────────────── -->
    <div class="drag-handle" aria-hidden="true">
      <div class="drag-handle-pill"></div>
    </div>

    <!-- ── Header ───────────────────────────────────────────────────── -->
    <div class="send-header">
      <span class="header-title">Select recipient</span>
      <a href="home-screen.html" class="close-btn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M15 5L5 15" stroke="#87878C" stroke-width="1.667" stroke-linecap="round"/>
          <path d="M5 5L15 15" stroke="#87878C" stroke-width="1.667" stroke-linecap="round"/>
        </svg>
      </a>
    </div>

    <!-- ── Search Field ─────────────────────────────────────────────── -->
    <div class="search-field" role="search" aria-label="Search recipients">
      <img src="assets/icon-search.svg" alt="">
      <span class="placeholder">Address, ENS, or username</span>
      <button class="scan-btn" aria-label="Scan QR code">
        <img src="assets/icon-share.svg" alt="">
      </button>
    </div>

    <!-- ── Recent ───────────────────────────────────────────────────── -->
    <div class="recent-label">Recent</div>

    <!-- ── Contact List ─────────────────────────────────────────────── -->
    <div class="contact-list" role="list" aria-label="Recent contacts">

      <!-- Contact 1 -->
      <div class="contact-row avatar-variant-1" role="listitem" aria-label="0x4248...EF33">
        <div class="avatar-wrap">
          <img class="avatar" src="assets/wallet-avatar.svg" alt="">
        </div>
        <div class="contact-text">
          <div class="contact-name">0x4248...EF33</div>
        </div>
      </div>

      <!-- Contact 2 -->
      <div class="contact-row" role="listitem" aria-label="modulo.eth — 0x540e...7262">
        <div class="avatar-wrap">
          <img class="avatar" src="assets/wallet-avatar.svg" alt="">
          <img class="modulo-badge" src="assets/icon-modulo-badge.svg" alt="Modulo">
        </div>
        <div class="contact-text">
          <div class="contact-name">modulo.eth</div>
          <div class="contact-sub">0x540e...7262</div>
        </div>
      </div>

      <!-- Contact 3 -->
      <div class="contact-row avatar-variant-3" role="listitem" aria-label="0xb5A9...Db3a">
        <div class="avatar-wrap">
          <img class="avatar" src="assets/wallet-avatar.svg" alt="">
        </div>
        <div class="contact-text">
          <div class="contact-name">0xb5A9...Db3a</div>
        </div>
      </div>

    </div><!-- /.contact-list -->

  </div><!-- /.phone -->

</body>
</html>
