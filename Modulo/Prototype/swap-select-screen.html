<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>Modulo — Select Token</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="modulo-shared.css">
  <style>
    /* ── Header — Figma: title 18px/600 left, close 22×22 right ────────── */
    .select-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 0;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--bk-text-primary);
    }

    /* Close button override — swap-select uses 22×22 */
    .close-btn {
      width: 22px;
      height: 22px;
    }

    /* ── Search Field (margin + active border override) ─────────────────── */
    .search-field {
      margin: 16px 20px 0;
      border-color: var(--bk-border-active);
    }

    /* ── Token List — Figma: rows 76.5px, bottom border ────────────────── */
    .token-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      margin-top: 16px;
      padding: 0 20px;
    }

    .token-list::-webkit-scrollbar {
      display: none;
    }

    .token-row {
      display: flex;
      align-items: center;
      padding: 0;
      gap: 16px;
      height: 76.5px;
      cursor: pointer;
      border-bottom: 1px solid var(--bk-border-subtle);
    }

    .token-row:last-child {
      border-bottom: none;
    }

    .token-row:hover {
      background: rgba(26, 26, 41, 0.5);
      margin: 0 -20px;
      padding: 0 20px;
      width: calc(100% + 40px);
    }

    .token-row img.token-icon {
      width: 42px;
      height: 42px;
      display: block;
      flex-shrink: 0;
    }

    .token-info {
      flex: 1;
      min-width: 0;
    }

    .token-name {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--bk-text-primary);
    }

    .token-balance {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--bk-text-secondary);
    }
  </style>
</head>
<body>

  <div class="phone" role="main" aria-label="Modulo select token screen">

    <!-- ── Status Bar ────────────────────────────────────────────────── -->
    <div class="status-bar" aria-hidden="true">
      <span class="status-time">9:41</span>
      <div class="status-right">
        <div class="signal-bars">
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
          <div class="signal-bar"></div>
        </div>
        <img src="assets/icon-wifi.svg" alt="" width="16" height="12">
        <div class="battery">
          <div class="battery-fill"></div>
        </div>
      </div>
    </div>

    <!-- ── Drag Handle (sheet indicator from Figma) ──────────────────── -->
    <div class="drag-handle" aria-hidden="true">
      <div class="drag-handle-pill"></div>
    </div>

    <!-- ── Header ───────────────────────────────────────────────────── -->
    <div class="select-header">
      <span class="header-title">Select token</span>
      <a href="swap-screen.html" class="close-btn" aria-label="Close">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M16.5 5.5L5.5 16.5" stroke="#87878C" stroke-width="1.667" stroke-linecap="round"/>
          <path d="M5.5 5.5L16.5 16.5" stroke="#87878C" stroke-width="1.667" stroke-linecap="round"/>
        </svg>
      </a>
    </div>

    <!-- ── Search Field ─────────────────────────────────────────────── -->
    <div class="search-field" role="search" aria-label="Search tokens">
      <img src="assets/icon-search.svg" alt="">
      <span>Token name or address</span>
    </div>

    <!-- ── Token List ───────────────────────────────────────────────── -->
    <div class="token-list" role="list" aria-label="Available tokens">

      <a href="swap-screen.html" class="token-row" role="listitem" aria-label="ETH — Balance: 1.1421 ETH">
        <img class="token-icon" src="assets/token-eth.svg" alt="">
        <div class="token-info">
          <div class="token-name">ETH</div>
          <div class="token-balance">Balance: 1.1421 ETH</div>
        </div>
      </a>

      <a href="swap-screen.html" class="token-row" role="listitem" aria-label="USDC — Balance: 5,342 USDC">
        <img class="token-icon" src="assets/token-usdc.svg" alt="">
        <div class="token-info">
          <div class="token-name">USDC</div>
          <div class="token-balance">Balance: 5,342 USDC</div>
        </div>
      </a>

      <a href="swap-screen.html" class="token-row" role="listitem" aria-label="WBTC — Balance: 0.0574 BTC">
        <img class="token-icon" src="assets/token-btc.svg" alt="">
        <div class="token-info">
          <div class="token-name">WBTC</div>
          <div class="token-balance">Balance: 0.0574 BTC</div>
        </div>
      </a>

      <a href="swap-screen.html" class="token-row" role="listitem" aria-label="SOL — Balance: 17.43 SOL">
        <img class="token-icon" src="assets/token-sol.svg" alt="">
        <div class="token-info">
          <div class="token-name">SOL</div>
          <div class="token-balance">Balance: 17.43 SOL</div>
        </div>
      </a>

      <a href="swap-screen.html" class="token-row" role="listitem" aria-label="USDT — Balance: 3,398 USDT">
        <img class="token-icon" src="assets/token-usdt.svg" alt="">
        <div class="token-info">
          <div class="token-name">USDT</div>
          <div class="token-balance">Balance: 3,398 USDT</div>
        </div>
      </a>

    </div><!-- /.token-list -->

  </div><!-- /.phone -->

</body>
</html>
